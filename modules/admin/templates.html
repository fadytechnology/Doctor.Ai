    <div id="templatesList"></div>

<div class="modal" id="templateModal"><div class="modal-content"><h3>إضافة قالب</h3>
    <div class="form-group"><label>اسم القالب</label><input type="text" id="tName" /></div>
    <div class="form-group"><label>الموضوع</label><input type="text" id="tSubject" /></div>
    <div class="form-group"><label>المحتوى</label><textarea id="tBody" rows="3"></textarea></div>
    <div class="btn-group"><button class="btn-save" onclick="saveTemplate()">حفظ</button><button class="btn-cancel" onclick="closeModal('templateModal')">إلغاء</button></div>
</div></div>
<script src="js/admin.js"></script>
<script>
let templates = getMockTemplates();
function renderTemplates() {
    const container = document.getElementById('templatesList');
    container.innerHTML = '';
    templates.forEach(t => {
        const d = document.createElement('div'); d.className = 'news-item';
        d.innerHTML = `<div class="title">${t.name}</div><div class="meta">${t.subject}</div><div style="font-size:13px;color:#64748b;margin-top:4px;">${t.body}</div><div class="actions"><button class="btn-sm btn-delete" onclick="deleteTemplate('${t.id}')"><i class="fas fa-trash"></i></button></div>`;
        container.appendChild(d);
    });
}
function openAddTemplate() { openModal('templateModal'); }
function saveTemplate() {
    const name = document.getElementById('tName').value.trim();
    if(!name) return alert('أدخل اسم القالب');
    templates.push({ id:generateId(), name, subject:document.getElementById('tSubject').value, body:document.getElementById('tBody').value });
    localStorage.setItem('adminTemplates', JSON.stringify(templates));
    closeModal('templateModal'); renderTemplates(); showToast('✅ تمت الإضافة');
}
function deleteTemplate(id) { if(!confirm('حذف القالب؟'))return; templates = templates.filter(t=>t.id!==id); localStorage.setItem('adminTemplates', JSON.stringify(templates)); renderTemplates(); }
function logout() { if(confirm('تأكيد الخروج؟')){ localStorage.clear(); sessionStorage.clear(); window.location.href='../../auth/login.html'; } }
document.addEventListener('DOMContentLoaded', renderTemplates);
</script>
</body>
