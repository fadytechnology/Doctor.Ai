<!-- مودال الإضافة -->
<div class="modal" id="adModal"><div class="modal-content"><h3>إضافة إعلان</h3>
    <div class="form-group"><label>العنوان</label><input type="text" id="adTitle" /></div>
    <div class="form-group"><label>رابط الصورة</label><input type="text" id="adImage" value="https://via.placeholder.com/300x100" /></div>
    <div class="form-group"><label>نقاط المشاهدة</label><input type="number" id="adPoints" value="5" /></div>
    <div class="form-group"><label>الفئة المستهدفة</label><select id="adTarget"><option value="all">الكل</option><option value="diabetic">مرضى السكر</option><option value="heart">مرضى القلب</option></select></div>
    <div class="btn-group"><button class="btn-save" onclick="saveAd()">حفظ</button><button class="btn-cancel" onclick="closeModal('adModal')">إلغاء</button></div>
</div></div>
<script src="js/admin.js"></script>
<script>
let ads = getMockAds();
function renderAds() {
    const container = document.getElementById('adsList');
    container.innerHTML = '';
    ads.forEach(ad => {
        const d = document.createElement('div'); d.className = 'ad-card';
        d.innerHTML = `<div class="info"><div class="title">${ad.title}</div><div class="meta">🎯 ${ad.target} | ⭐ ${ad.points} نقطة | ${ad.createdAt}</div></div>
        <div><span class="status-badge ${ad.status}">${ad.status==='active'?'نشط':ad.status==='pending'?'قيد المراجعة':'غير نشط'}</span>
        <button class="btn-sm btn-edit" onclick="toggleAd('${ad.id}')"><i class="fas fa-power-off"></i></button>
        <button class="btn-sm btn-delete" onclick="deleteAd('${ad.id}')"><i class="fas fa-trash"></i></button></div>`;
        container.appendChild(d);
    });
}
function openAddAd() { openModal('adModal'); }
function saveAd() {
    const title = document.getElementById('adTitle').value.trim();
    if(!title) { alert('أدخل العنوان'); return; }
    ads.push({ id:generateId(), title, image:document.getElementById('adImage').value, points:parseInt(document.getElementById('adPoints').value)||5, target:document.getElementById('adTarget').value, status:'pending', createdAt:new Date().toISOString().split('T')[0] });
    localStorage.setItem('adminAds', JSON.stringify(ads));
    closeModal('adModal'); renderAds(); showToast('✅ تمت الإضافة');
}
function toggleAd(id) { const ad = ads.find(a=>a.id===id); if(!ad)return; ad.status = ad.status==='active'?'inactive':'active'; localStorage.setItem('adminAds', JSON.stringify(ads)); renderAds(); showToast('✅ تم التحديث'); }
function deleteAd(id) { if(!confirm('حذف الإعلان؟'))return; ads = ads.filter(a=>a.id!==id); localStorage.setItem('adminAds', JSON.stringify(ads)); renderAds(); }
function logout() { if(confirm('تأكيد الخروج؟')){ localStorage.clear(); sessionStorage.clear(); window.location.href='../../auth/login.html'; } }
document.addEventListener('DOMContentLoaded', renderAds);
</script>
