    <style>
        .track-item { background:#fff; padding:14px 16px; border-radius:12px; margin-bottom:10px; box-shadow:0 1px 4px rgba(0,0,0,0.04); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
        .track-item .info .name { font-weight:700; }
        .track-item .info .batch { font-size:12px; color:#64748b; }
        .track-item .status-badge { font-size:12px; padding:2px 12px; border-radius:20px; font-weight:600; }
        .track-item .status-badge.authentic { background:#d1fae5; color:#065f46; }
        .track-item .status-badge.suspicious { background:#fef2f2; color:#991b1b; }
        .track-item .status-badge.pending { background:#fef3c7; color:#92400e; }
    </style>

        <a href="drugs-db.html"><i class="fas fa-capsules"></i> الأدوية</a>

    <div style="margin-bottom:16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
        <input type="text" id="trackSearch" placeholder="🔍 بحث بكود الدفعة أو الاسم..." style="flex:1;min-width:200px;padding:8px 14px;border:2px solid #e5e7eb;border-radius:12px;font-size:14px;" />
        <button class="btn-sm btn-approve" onclick="trackMedicine()"><i class="fas fa-search"></i> فحص</button>
    </div>
    <div id="trackList"></div>
</div>
<script src="js/admin.js"></script>
<script>
let trackMeds = getMockTrackMeds();
function renderTrack() {
    const container = document.getElementById('trackList');
    container.innerHTML = '';
    trackMeds.forEach(m => {
        const d = document.createElement('div'); d.className = 'track-item';
        const statusMap = { authentic:'أصلي ✅', suspicious:'مشبوه ⚠️', pending:'قيد الفحص' };
        d.innerHTML = `<div class="info"><span class="name">${m.name}</span> <span class="batch">دفعة: ${m.batch} | المصدر: ${m.source}</span></div>
        <span class="status-badge ${m.status}">${statusMap[m.status] || m.status}</span>
        <div><button class="btn-sm btn-edit" onclick="verifyMed('${m.id}')"><i class="fas fa-check"></i> توثيق</button></div>`;
        container.appendChild(d);
    });
    if(trackMeds.length === 0) container.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:20px;">لا توجد أدوية مسجلة</p>';
}
function trackMedicine() {
    const search = document.getElementById('trackSearch').value.trim();
    if(!search) { renderTrack(); return; }
    // بحث وهمي: لو الكود يحتوي على 123 يظهر أصلي، 456 يظهر مشبوه
    const found = trackMeds.filter(m => m.name.includes(search) || m.batch.includes(search));
    const container = document.getElementById('trackList');
    if(found.length === 0) {
        // إضافة نتيجة وهمية للفحص
        const status = search.includes('123') ? 'authentic' : search.includes('456') ? 'suspicious' : 'pending';
        const statusMap = { authentic:'أصلي ✅', suspicious:'مشبوه ⚠️', pending:'قيد الفحص' };
        container.innerHTML = `<div class="track-item"><div class="info"><span class="name">نتيجة الفحص</span> <span class="batch">الكود: ${search}</span></div>
        <span class="status-badge ${status}">${statusMap[status]}</span></div>`;
        return;
    }
    renderTrack();
}
function verifyMed(id) {
    const m = trackMeds.find(x=>x.id===id);
    if(!m) return;
    m.status = 'authentic';
    m.verifiedAt = new Date().toISOString().split('T')[0];
    localStorage.setItem('adminTrackMeds', JSON.stringify(trackMeds));
    renderTrack();
    showToast('✅ تم توثيق الدواء');
}
function logout() { if(confirm('تأكيد الخروج؟')){ localStorage.clear(); sessionStorage.clear(); window.location.href='../../auth/login.html'; } }
document.addEventListener('DOMContentLoaded', renderTrack);
</script>
</body>
</html>
