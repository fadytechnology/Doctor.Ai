<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الإشعارات الجماعية - الإدارة المركزية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../CSS/style.css" />
    <link rel="stylesheet" href="admin.css" />
</head>
<body>
<div class="admin-container">
    <header class="admin-header"><div class="logo"><i class="fas fa-crown"></i> Doctor.ai <span style="color:#1e293b;font-weight:600;font-size:16px;">| الإشعارات الجماعية</span></div><div class="user-area"><span class="name"><i class="fas fa-user-shield"></i> المدير</span><span class="avatar">م</span><button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button></div></header>
    <nav class="admin-sidebar"><!-- نفس السايدبار مع active --></nav>
    <div style="background:#fff;padding:20px;border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,0.04);margin-bottom:20px;">
        <h4 style="color:#1e293b;margin-bottom:12px;">إرسال إشعار جديد</h4>
        <div class="form-group"><label>العنوان</label><input type="text" id="notifTitle" /></div>
        <div class="form-group"><label>المحتوى</label><textarea id="notifBody" rows="2"></textarea></div>
        <div class="form-group"><label>المستهدف</label><select id="notifTarget"><option value="all">الكل</option><option value="patient">مرضى</option><option value="pharmacy">صيادلة</option><option value="clinic">عيادات</option></select></div>
        <button class="btn-sm btn-approve" onclick="sendNotification()"><i class="fas fa-paper-plane"></i> إرسال</button>
    </div>
    <div id="notifList"></div>
</div>
<script src="js/admin.js"></script>
<script>
let notifs = getMockNotifications();
function renderNotifs() {
    const container = document.getElementById('notifList');
    container.innerHTML = '';
    notifs.forEach(n => {
        const d = document.createElement('div'); d.className = 'news-item';
        d.innerHTML = `<div class="title">${n.title}</div><div class="meta">${n.body} | 🎯 ${n.target} | ${n.sentAt || 'مسودة'}</div>`;
        container.appendChild(d);
    });
}
function sendNotification() {
    const title = document.getElementById('notifTitle').value.trim();
    if(!title) return alert('أدخل العنوان');
    notifs.push({ id:generateId(), title, body:document.getElementById('notifBody').value, target:document.getElementById('notifTarget').value, sentAt:new Date().toISOString().split('T')[0], status:'sent' });
    localStorage.setItem('adminNotifications', JSON.stringify(notifs));
    renderNotifs();
    showToast('✅ تم الإرسال');
}
function logout() { if(confirm('تأكيد الخروج؟')){ localStorage.clear(); sessionStorage.clear(); window.location.href='../../auth/login.html'; } }
document.addEventListener('DOMContentLoaded', renderNotifs);
</script>
</body>
</html>
