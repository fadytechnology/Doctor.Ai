            <span class="avatar">م</span>

        </div>
    </header>
    <nav class="admin-sidebar">
        <a href="index.html"><i class="fas fa-chart-pie"></i> لوحة القيادة</a>
        <a href="users.html"><i class="fas fa-users"></i> المستخدمين</a>

        <a href="clinics.html"><i class="fas fa-stethoscope"></i> العيادات</a>
        <a href="labs.html"><i class="fas fa-microscope"></i> المعامل</a>
        <a href="radiology.html"><i class="fas fa-x-ray"></i> الأشعة</a>

        <a href="drugs-db.html"><i class="fas fa-capsules"></i> الأدوية</a>

    </nav>
    <div style="background:#fff;padding:24px;border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,0.04);max-width:600px;">
        <h3 style="color:#1e293b;margin-bottom:16px;">⚙️ إعدادات المنصة</h3>
        <div class="form-group"><label>اسم المنصة</label><input type="text" id="settingAppName" /></div>
        <div class="form-group"><label>رابط الشعار</label><input type="text" id="settingLogo" placeholder="assets/images/logo.png" /></div>
        <div class="form-group"><label>اللغة الافتراضية</label><select id="settingLang"><option value="ar">العربية</option><option value="en">English</option></select></div>
        <div class="form-group"><label>نسبة العمولة (%)</label><input type="number" id="settingCommission" step="0.5" /></div>
        <div class="form-group"><label>نقاط لكل 10 ج.م</label><input type="number" id="settingLoyaltyPoints" /></div>
        <div class="form-group"><label>وضع الصيانة</label><select id="settingMaintenance"><option value="false">معطل</option><option value="true">مفعل</option></select></div>
        <button class="btn-sm btn-approve" onclick="saveSettings()" style="padding:10px 24px;font-size:15px;"><i class="fas fa-save"></i> حفظ الإعدادات</button>
    </div>
</div>
<script src="js/admin.js"></script>
<script>
let settings = getMockSettings();
function renderSettings() {
    document.getElementById('settingAppName').value = settings.appName || '';
    document.getElementById('settingLogo').value = settings.logo || '';
    document.getElementById('settingLang').value = settings.defaultLanguage || 'ar';
    document.getElementById('settingCommission').value = settings.commissionRate || 5;
    document.getElementById('settingLoyaltyPoints').value = settings.loyaltyPointsPerEGP || 1;
    document.getElementById('settingMaintenance').value = settings.maintenanceMode ? 'true' : 'false';
}
function saveSettings() {
    settings.appName = document.getElementById('settingAppName').value.trim() || 'Doctor.ai';
    settings.logo = document.getElementById('settingLogo').value.trim() || 'assets/images/logo.png';
    settings.defaultLanguage = document.getElementById('settingLang').value;
    settings.commissionRate = parseFloat(document.getElementById('settingCommission').value) || 5;
    settings.loyaltyPointsPerEGP = parseInt(document.getElementById('settingLoyaltyPoints').value) || 1;
    settings.maintenanceMode = document.getElementById('settingMaintenance').value === 'true';
    localStorage.setItem('adminSettings', JSON.stringify(settings));
    showToast('✅ تم حفظ الإعدادات');
}
function logout() { if(confirm('تأكيد الخروج؟')){ localStorage.clear(); sessionStorage.clear(); window.location.href='../../auth/login.html'; } }
document.addEventListener('DOMContentLoaded', renderSettings);
</script>
</body>
</html>
