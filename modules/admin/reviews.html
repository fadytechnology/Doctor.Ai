<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        .review-item { background:#fff; padding:16px; border-radius:12px; margin-bottom:10px; box-shadow:0 1px 4px rgba(0,0,0,0.04); border-right:4px solid #f59e0b; }
        .review-item .stars { color:#f59e0b; }
        .review-item .patient { font-weight:700; }
        .review-item .provider { font-size:13px; color:#64748b; }
        .review-item .comment { margin:6px 0; font-size:14px; }
        .review-item .actions { display:flex; gap:8px; margin-top:8px; }
    </style>
</head>
<body>
<div class="admin-container">
    <header class="admin-header">

        <div class="user-area">
            <span class="name"><i class="fas fa-user-shield"></i> المدير</span>
            <span class="avatar">م</span>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </header>
    <nav class="admin-sidebar">
        <a href="index.html"><i class="fas fa-chart-pie"></i> لوحة القيادة</a>
        <a href="users.html"><i class="fas fa-users"></i> المستخدمين</a>
        <a href="pharmacies.html"><i class="fas fa-prescription-bottle"></i> الصيدليات</a>
        <a href="clinics.html"><i class="fas fa-stethoscope"></i> العيادات</a>
        <a href="labs.html"><i class="fas fa-microscope"></i> المعامل</a>
        <a href="radiology.html"><i class="fas fa-x-ray"></i> الأشعة</a>
        <a href="suppliers.html"><i class="fas fa-truck"></i> الموردين</a>
        <a href="approvals.html"><i class="fas fa-clock"></i> الموافقات</a>
        <a href="ads.html"><i class="fas fa-ad"></i> الإعلانات</a>
        <a href="content.html"><i class="fas fa-newspaper"></i> المحتوى</a>
        <a href="drugs-db.html"><i class="fas fa-capsules"></i> الأدوية</a>
        <a href="subscriptions.html"><i class="fas fa-crown"></i> الباقات</a>
        <a href="commission.html"><i class="fas fa-money-bill-wave"></i> العمولات</a>
        <a href="loyalty.html"><i class="fas fa-gem"></i> الولاء</a>
        <a href="notifications.html"><i class="fas fa-bell"></i> الإشعارات</a>
        <a href="reports.html"><i class="fas fa-chart-bar"></i> التقارير</a>
        <a href="logs.html"><i class="fas fa-history"></i> السجل</a>
        <a href="settings.html"><i class="fas fa-cog"></i> الإعدادات</a>
        <a href="templates.html"><i class="fas fa-file-alt"></i> القوالب</a>
        <a href="reviews.html" class="active"><i class="fas fa-star"></i> التقييمات</a>
        <a href="track-meds.html"><i class="fas fa-search"></i> تتبع الأدوية</a>
        <a href="complaints.html"><i class="fas fa-exclamation-circle"></i> الشكاوى</a>
    </nav>
    <div id="reviewsList"></div>
</div>
<script src="js/admin.js"></script>
<script>
let reviews = getMockReviews();
function renderReviews() {
    const container = document.getElementById('reviewsList');
    container.innerHTML = '';
    reviews.forEach(r => {
        const stars = '⭐'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
        const d = document.createElement('div'); d.className = 'review-item';
        d.innerHTML = `<div><span class="patient">${r.patient}</span> <span class="provider">→ ${r.provider}</span> <span class="stars">${stars}</span></div>
        <div class="comment">${r.comment}</div>
        <div style="font-size:12px;color:#94a3b8;">${r.createdAt} | ${r.status === 'approved' ? '✅ منشور' : '⏳ قيد المراجعة'}</div>
        <div class="actions">${r.status === 'pending' ? `<button class="btn-sm btn-approve" onclick="approveReview('${r.id}')"><i class="fas fa-check"></i> موافقة</button>` : ''}
        ${r.status === 'pending' ? `<button class="btn-sm btn-reject" onclick="rejectReview('${r.id}')"><i class="fas fa-times"></i> حذف</button>` : ''}
        <button class="btn-sm btn-delete" onclick="deleteReview('${r.id}')"><i class="fas fa-trash"></i></button></div>`;
        container.appendChild(d);
    });
}
function approveReview(id) { const r = reviews.find(x=>x.id===id); if(!r)return; r.status='approved'; localStorage.setItem('adminReviews', JSON.stringify(reviews)); renderReviews(); showToast('✅ تم النشر'); }
function rejectReview(id) { if(!confirm('حذف التقييم؟'))return; reviews = reviews.filter(x=>x.id!==id); localStorage.setItem('adminReviews', JSON.stringify(reviews)); renderReviews(); }
function deleteReview(id) { if(!confirm('حذف التقييم نهائياً؟'))return; reviews = reviews.filter(x=>x.id!==id); localStorage.setItem('adminReviews', JSON.stringify(reviews)); renderReviews(); }
function logout() { if(confirm('تأكيد الخروج؟')){ localStorage.clear(); sessionStorage.clear(); window.location.href='../../auth/login.html'; } }
document.addEventListener('DOMContentLoaded', renderReviews);
</script>
</body>
</html>
