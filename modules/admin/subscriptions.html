    <div style="margin-bottom:16px;"><button class="btn-sm btn-approve" onclick="openAddPackage()"><i class="fas fa-plus"></i> إضافة باقة جديدة</button></div>
    <div id="packagesGrid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;"></div>
</div>
<div class="modal" id="packageModal"><div class="modal-content"><h3>إضافة باقة</h3>
    <div class="form-group"><label>اسم الباقة</label><input type="text" id="pName" /></div>
    <div class="form-group"><label>السعر (ج.م)</label><input type="number" id="pPrice" value="0" /></div>
    <div class="form-group"><label>المميزات (مفصولة بفاصلة)</label><input type="text" id="pFeatures" placeholder="مميز1, مميز2" /></div>
    <div class="btn-group"><button class="btn-save" onclick="savePackage()">حفظ</button><button class="btn-cancel" onclick="closeModal('packageModal')">إلغاء</button></div>
</div></div>
<script src="js/admin.js"></script>
<script>
let packages = getMockSubscriptions();
function renderPackages() {
    const grid = document.getElementById('packagesGrid');
    grid.innerHTML = '';
    packages.forEach(p => {
        const div = document.createElement('div'); div.className = 'package-card';
        const features = p.features ? p.features.map(f => `<li>✅ ${f}</li>`).join('') : '<li>لا توجد مميزات</li>';
        div.innerHTML = `<div class="name">${p.name}</div><div class="price">${p.price} ج.م</div><ul class="features">${features}</ul><button class="btn-sm btn-delete" onclick="deletePackage('${p.id}')" style="margin-top:10px;"><i class="fas fa-trash"></i> حذف</button>`;
        grid.appendChild(div);
    });
}
function openAddPackage() { openModal('packageModal'); }
function savePackage() {
    const name = document.getElementById('pName').value.trim();
    if(!name) return alert('أدخل الاسم');
    packages.push({ id:generateId(), name, price:parseFloat(document.getElementById('pPrice').value)||0, features:document.getElementById('pFeatures').value.split(',').map(s=>s.trim()).filter(Boolean), status:'active' });
    localStorage.setItem('adminSubscriptions', JSON.stringify(packages));
    closeModal('packageModal'); renderPackages(); showToast('✅ تمت الإضافة');
}
function deletePackage(id) { if(!confirm('حذف الباقة؟'))return; packages = packages.filter(p=>p.id!==id); localStorage.setItem('adminSubscriptions', JSON.stringify(packages)); renderPackages(); }
function logout() { if(confirm('تأكيد الخروج؟')){ localStorage.clear(); sessionStorage.clear(); window.location.href='../../auth/login.html'; } }
document.addEventListener('DOMContentLoaded', renderPackages);
</script>
</body>
