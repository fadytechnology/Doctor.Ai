    <nav class="admin-sidebar">

    <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="🔍 بحث عن مركز..." oninput="renderRads()" />
        <select id="statusFilter" onchange="renderRads()">
            <option value="all">كل الحالات</option>
            <option value="approved">موافق</option>
            <option value="pending">قيد المراجعة</option>
            <option value="rejected">مرفوض</option>
        </select>
        <button class="btn-search" onclick="renderRads()"><i class="fas fa-search"></i> بحث</button>
    </div>
    <div class="table-responsive">
        <table class="table"><thead><tr><th>#</th><th>اسم المركز</th><th>المسؤول</th><th>الحالة</th><th>التسجيل</th><th>الإجراءات</th></tr></thead><tbody id="radsBody"></tbody></table>
    </div>
</div>
<script src="js/admin.js"></script>
<script>
let rads = getMockRadiology();
function renderRads() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const s = document.getElementById('statusFilter').value;
    const filtered = rads.filter(l => (l.name.includes(q) || l.owner.includes(q)) && (s === 'all' || l.status === s));
    const tbody = document.getElementById('radsBody');
    tbody.innerHTML = '';
    filtered.forEach((l, i) => {
        const smap = { approved:'موافق', pending:'قيد المراجعة', rejected:'مرفوض' };
        tbody.innerHTML += `<tr><td>${i+1}</td><td>${l.name}</td><td>${l.owner}</td><td><span class="status-badge ${l.status}">${smap[l.status]||l.status}</span></td><td>${l.createdAt}</td><td>${l.status==='pending'?`<button class="btn-sm btn-approve" onclick="approveRad('${l.id}')"><i class="fas fa-check"></i> موافقة</button>`:''} ${l.status==='pending'?`<button class="btn-sm btn-reject" onclick="rejectRad('${l.id}')"><i class="fas fa-times"></i> رفض</button>`:''}</td></tr>`;
    });
}
function approveRad(id) { const l = rads.find(x=>x.id===id); if(!l)return; l.status='approved'; localStorage.setItem('adminRadiology',JSON.stringify(rads)); renderRads(); showToast('✅ تم الموافقة'); }
function rejectRad(id) { if(!confirm('تأكيد الرفض؟'))return; const l = rads.find(x=>x.id===id); if(!l)return; l.status='rejected'; localStorage.setItem('adminRadiology',JSON.stringify(rads)); renderRads(); showToast('⚠️ تم الرفض','warning'); }
function logout() { if(confirm('تأكيد الخروج؟')){ localStorage.clear(); sessionStorage.clear(); window.location.href='../../auth/login.html'; } }
document.addEventListener('DOMContentLoaded', renderRads);
</script>
</body>
</html>
