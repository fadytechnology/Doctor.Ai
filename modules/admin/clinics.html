<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إدارة العيادات - الإدارة المركزية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../CSS/style.css" />
    <link rel="stylesheet" href="admin.css" />
</head>
<body>
<div class="admin-container">
    <header class="admin-header">
        <div class="logo"><i class="fas fa-crown"></i> Doctor.ai <span style="color:#1e293b;font-weight:600;font-size:16px;">| إدارة العيادات</span></div>
        <div class="user-area">
            <span class="name"><i class="fas fa-user-shield"></i> المدير</span>
            <span class="avatar">م</span>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </header>

    <nav class="admin-sidebar">
        <a href="index.html"><i class="fas fa-chart-pie"></i> لوحة القيادة</a>
        <a href="users.html"><i class="fas fa-users"></i> المستخدمين</a>
        <a href="pharmacies.html"><i class="fas fa-prescription-bottle"></i> الصيدليات</a>
        <a href="clinics.html" class="active"><i class="fas fa-stethoscope"></i> العيادات</a>
        <a href="complaints.html"><i class="fas fa-exclamation-circle"></i> الشكاوى</a>
        <a href="#"><i class="fas fa-ad"></i> الإعلانات</a>
        <a href="#"><i class="fas fa-newspaper"></i> المحتوى</a>
        <a href="#"><i class="fas fa-cog"></i> الإعدادات</a>
    </nav>

    <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="🔍 بحث عن عيادة..." oninput="renderClinics()" />
        <select id="statusFilter" onchange="renderClinics()">
            <option value="all">كل الحالات</option>
            <option value="approved">موافق</option>
            <option value="pending">قيد المراجعة</option>
            <option value="rejected">مرفوض</option>
        </select>
        <button class="btn-search" onclick="renderClinics()"><i class="fas fa-search"></i> بحث</button>
    </div>

    <div class="table-responsive">
        <table class="table" id="clinicsTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>اسم العيادة</th>
                    <th>المسؤول</th>
                    <th>التخصص</th>
                    <th>كود التعاون</th>
                    <th>الحالة</th>
                    <th>الإجراءات</th>
                </tr>
            </thead>
            <tbody id="clinicsBody"></tbody>
        </table>
    </div>
</div>

<script src="js/admin.js"></script>
<script>
let clinics = getMockClinics();

function renderClinics() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const status = document.getElementById('statusFilter').value;

    const filtered = clinics.filter(c => {
        const matchName = c.name.includes(search) || c.owner.includes(search);
        const matchStatus = status === 'all' || c.status === status;
        return matchName && matchStatus;
    });

    const tbody = document.getElementById('clinicsBody');
    tbody.innerHTML = '';
    filtered.forEach((c, idx) => {
        const statusMap = { approved:'موافق', pending:'قيد المراجعة', rejected:'مرفوض' };
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${idx + 1}</td>
            <td>${c.name}</td>
            <td>${c.owner}</td>
            <td>${c.specialty}</td>
            <td><strong>${c.code}</strong></td>
            <td><span class="status-badge ${c.status}">${statusMap[c.status] || c.status}</span></td>
            <td>
                ${c.status === 'pending' ? `<button class="btn-sm btn-approve" onclick="approveClinic('${c.id}')"><i class="fas fa-check"></i> موافقة</button>` : ''}
                ${c.status === 'pending' ? `<button class="btn-sm btn-reject" onclick="rejectClinic('${c.id}')"><i class="fas fa-times"></i> رفض</button>` : ''}
                <button class="btn-sm btn-view" onclick="showToast('🔍 عرض تفاصيل ${c.name}')"><i class="fas fa-eye"></i> عرض</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

function approveClinic(id) {
    const c = clinics.find(c => c.id === id);
    if (!c) return;
    c.status = 'approved';
    localStorage.setItem('adminClinics', JSON.stringify(clinics));
    renderClinics();
    showToast('✅ تم الموافقة على عيادة ' + c.name);
}

function rejectClinic(id) {
    if (!confirm('هل أنت متأكد من رفض هذه العيادة؟')) return;
    const c = clinics.find(c => c.id === id);
    if (!c) return;
    c.status = 'rejected';
    localStorage.setItem('adminClinics', JSON.stringify(clinics));
    renderClinics();
    showToast('⚠️ تم رفض عيادة ' + c.name, 'warning');
}

function logout() {
    if (confirm('هل أنت متأكد من الخروج؟')) {
        localStorage.clear();
        sessionStorage.clear();
        window.location.href = '../../auth/login.html';
    }
}

document.addEventListener('DOMContentLoaded', renderClinics);
</script>
</body>
</html>
