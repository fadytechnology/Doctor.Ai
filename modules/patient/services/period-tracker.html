<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>تتبع الدورة الشهرية - Doctor.ai</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../../../CSS/style.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Cairo',sans-serif; background:#f2f4f8; direction:rtl; padding:16px; min-height:100vh; }
        .app-container { max-width:480px; margin:0 auto; }
        .page-header { background:#fff; padding:16px; border-radius:20px; box-shadow:0 2px 12px rgba(0,0,0,0.04); margin-bottom:16px; display:flex; align-items:center; gap:12px; }
        .page-header .back-btn { background:#f1f5f9; border:none; width:40px; height:40px; border-radius:50%; font-size:18px; color:#1e293b; cursor:pointer; }
        .page-header h1 { font-size:20px; font-weight:700; color:#1e293b; margin:0; flex:1; }
        .page-header h1 i { color:#0d9488; }
        .content-box { background:#fff; border-radius:20px; padding:20px; box-shadow:0 1px 4px rgba(0,0,0,0.04); }
        .cycle-info { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
        .cycle-card { background:#f8fafc; padding:12px; border-radius:12px; text-align:center; }
        .cycle-card .num { font-size:24px; font-weight:800; color:#0d9488; }
        .cycle-card .label { font-size:12px; color:#94a3b8; }
        .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-top:12px; }
        .calendar-grid .day { background:#f1f5f9; padding:8px 0; text-align:center; border-radius:8px; font-size:13px; font-weight:600; color:#1e293b; }
        .calendar-grid .day.fertile { background:#fef3c7; color:#92400e; }
        .calendar-grid .day.period { background:#fecaca; color:#991b1b; }
        .calendar-grid .day.ovulation { background:#d1fae5; color:#065f46; }
        .bottom-nav { display:flex; justify-content:space-around; align-items:center; background:#fff; padding:10px 0; border-radius:30px; box-shadow:0 -2px 12px rgba(0,0,0,0.04); margin-top:16px; }
        .bottom-nav a { color:#94a3b8; font-size:22px; text-decoration:none; padding:8px 16px; border-radius:30px; transition:0.2s; }
        .bottom-nav a.active { color:#0d9488; background:rgba(13,148,136,0.1); }
        @media (max-width:480px) { .cycle-info { grid-template-columns:1fr 1fr; } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="page-header">
        <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-right"></i></button>
        <h1><i class="fas fa-female"></i> تتبع الدورة الشهرية</h1>
    </div>
    <div class="content-box">
        <div class="cycle-info">
            <div class="cycle-card"><span class="num">28</span><span class="label">متوسط طول الدورة</span>

        <div id="periodHistory"></div>
        <button onclick="addPeriod()" class="btn-add">+ تسجيل دورة جديدة</button>
        
</div>
            <div class="cycle-card"><span class="num">14</span><span class="label">يوم التبويض المتوقع</span></div>
        </div>
        <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:12px;margin-bottom:16px;color:#166534;text-align:center;">
            <i class="fas fa-calendar-check"></i> أيام الخصوبة العالية: 12 - 16 يوليو
        </div>
        <h4 style="color:#475569;margin-bottom:8px;">تقويم الشهر</h4>
        <div class="calendar-grid">
            <div class="day">ن</div><div class="day">ث</div><div class="day">ر</div><div class="day">خ</div><div class="day">ج</div><div class="day">س</div><div class="day">ح</div>
            <div class="day">1</div><div class="day">2</div><div class="day">3</div><div class="day period">4</div><div class="day period">5</div><div class="day period">6</div><div class="day">7</div>
            <div class="day">8</div><div class="day">9</div><div class="day fertile">10</div><div class="day fertile">11</div><div class="day ovulation">12</div><div class="day fertile">13</div><div class="day fertile">14</div>
            <div class="day">15</div><div class="day">16</div><div class="day">17</div><div class="day">18</div><div class="day">19</div><div class="day">20</div><div class="day">21</div>
        </div>
        <button onclick="alert('📝 تم تسجيل اليوم الأول من الدورة')" style="width:100%;margin-top:16px;padding:10px;background:#0d9488;color:#fff;border:none;border-radius:12px;font-weight:600;cursor:pointer;">تسجيل اليوم الأول</button>
    </div>
    <nav class="bottom-nav">
        <a href="../index.html"><i class="fas fa-home"></i></a>
        <a href="#" class="active"><i class="fas fa-female"></i></a>
        <a href="../services-app.html"><i class="fas fa-th-large"></i></a>
    </nav>
</div>

        <script>
        const API_BASE = 'http://localhost:5000/api';
        function getToken() { return localStorage.getItem('token'); }
        async function addPeriod() {
            const date = prompt('أدخل تاريخ بداية الدورة (YYYY-MM-DD):');
            if (!date) return;
            const token = getToken();
            if (!token) return alert('يرجى تسجيل الدخول');
            try {
                const res = await fetch(`${API_BASE}/period`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ start_date: date })
                });
                const data = await res.json();
                if (data.success) { alert('✅ تم تسجيل الدورة'); loadHistory(); }
                else alert('❌ فشل التسجيل');
            } catch (err) { alert('❌ حدث خطأ'); }
        }
        async function loadHistory() {
            const token = getToken();
            if (!token) return;
            try {
                const res = await fetch(`${API_BASE}/period/history`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success) {
                    const list = document.getElementById('periodHistory');
                    if (list) {
                        list.innerHTML = '';
                        if (data.data.length === 0) {
                            list.innerHTML = '<div class="empty">📭 لا توجد دورات مسجلة</div>';
                        } else {
                            data.data.forEach(p => {
                                const div = document.createElement('div');
                                div.className = 'period-item';
                                div.innerHTML = `
                                    📅 بداية: ${p.start_date} - مدة: ${p.cycle_length || 28} يوم
                                `;
                                list.appendChild(div);
                            });
                        }
                    }
                }
            } catch (err) { console.error(err); }
        }
        document.addEventListener('DOMContentLoaded', loadHistory);
        window.addPeriod = addPeriod;
        </script>
        
</body>
</html>
