<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>مشاركة الملف الطبي - Doctor.ai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../../CSS/style.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Cairo',sans-serif; background:#f2f4f8; direction:rtl; padding:16px; min-height:100vh; }
        .app-container { max-width:480px; margin:0 auto; background:#fff; border-radius:28px; padding:20px; box-shadow:0 8px 40px rgba(0,0,0,0.06); }
        .header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
        .header .back { background:none; border:none; font-size:20px; color:#0d9488; cursor:pointer; }
        .header .title { font-size:20px; font-weight:700; color:#1e293b; flex:1; }
        .form-group { margin-bottom:12px; }
        .form-group label { display:block; font-weight:600; color:#1e293b; font-size:13px; margin-bottom:4px; }
        .form-group input, .form-group select { width:100%; padding:10px; border:2px solid #e5e7eb; border-radius:12px; font-size:14px; background:#f9fafb; }
        .btn-primary { width:100%; padding:12px; background:#0d9488; color:#fff; border:none; border-radius:14px; font-size:16px; font-weight:600; cursor:pointer; }
        .share-item { padding:8px 0; border-bottom:1px solid #f1f5f9; display:flex; justify-content:space-between; font-size:14px; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <button class="back" onclick="window.history.back()"><i class="fas fa-arrow-right"></i></button>
        <div class="title">🔐 مشاركة الملف الطبي</div>
    </div>
    <p style="font-size:13px;color:#64748b;margin-bottom:12px;">شارك ملفك الصحي مع طبيب أو صيدلي موثوق.</p>
    <div class="form-group"><label><i class="fas fa-user-md"></i> اسم الطبيب/الصيدلي</label><input type="text" id="shareName" placeholder="د. خالد / صيدلية النور" /></div>
    <div class="form-group"><label><i class="fas fa-tag"></i> كود التعاون الخاص به</label><input type="text" id="shareCode" placeholder="مثال: CL-67890" /></div>
    <button class="btn-primary" onclick="shareEHR()"><i class="fas fa-share-alt"></i> مشاركة الملف</button>
    <div style="margin-top:16px;">
        <h4 style="font-size:14px;color:#1e293b;border-bottom:1px solid #e5e7eb;padding-bottom:8px;">📋 طلبات المشاركة السابقة</h4>
        <div id="shareHistory"></div>
    </div>
</div>
<script>
function loadShares() {
    const shares = JSON.parse(localStorage.getItem('ehrShares') || '[]');
    const container = document.getElementById('shareHistory');
    if (shares.length === 0) { container.innerHTML = '<p style="color:#94a3b8;font-size:13px;text-align:center;">لا توجد مشاركات سابقة</p>'; return; }
    container.innerHTML = '';
    shares.forEach(s => {
        const div = document.createElement('div');
        div.className = 'share-item';
        div.innerHTML = `<span>${s.name} (${s.code})</span><span style="color:#0d9488;">${s.status || 'نشط'}</span>`;
        container.appendChild(div);
    });
}
function shareEHR() {
    const name = document.getElementById('shareName').value.trim();
    const code = document.getElementById('shareCode').value.trim();
    if (!name || !code) { alert('❌ يرجى إدخال الاسم والكود'); return; }
    const shares = JSON.parse(localStorage.getItem('ehrShares') || '[]');
    shares.push({ name, code, status: 'قيد الموافقة', date: new Date().toISOString() });
    localStorage.setItem('ehrShares', JSON.stringify(shares));
    document.getElementById('shareName').value = ''; document.getElementById('shareCode').value = '';
    loadShares();
    alert('✅ تم إرسال طلب مشاركة الملف الطبي بنجاح!');
}
document.addEventListener('DOMContentLoaded', loadShares);
</script>
</body>
</html>
