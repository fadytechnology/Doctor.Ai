<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>الخزنة الصحية - Doctor.ai</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../../../CSS/style.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f2f4f8; direction: rtl; padding: 16px; min-height: 100vh; }
        .app-container { max-width: 480px; margin: 0 auto; }
        .page-header { background: #fff; padding: 16px; border-radius: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
        .page-header .back-btn { background: #f1f5f9; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; color: #1e293b; cursor: pointer; }
        .page-header h1 { font-size: 20px; font-weight: 700; color: #1e293b; margin: 0; flex: 1; }
        .page-header h1 i { color: #ef4444; }
        .file-item { background: #fff; padding: 16px; border-radius: 16px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); display: flex; justify-content: space-between; align-items: center; }
        .file-item .info .name { font-weight: 600; }
        .file-item .info .date { font-size: 12px; color: #94a3b8; }
        .file-item .btn-download { background: #f1f5f9; border: none; padding: 6px 16px; border-radius: 30px; font-size: 12px; cursor: pointer; }
        .btn-upload { width: 100%; padding: 14px; background: #0d9488; color: #fff; border: none; border-radius: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .bottom-nav { display: flex; justify-content: space-around; align-items: center; background: #fff; padding: 10px 0; border-radius: 30px; box-shadow: 0 -2px 12px rgba(0,0,0,0.04); margin-top: 16px; }
        .bottom-nav a { color: #94a3b8; font-size: 22px; text-decoration: none; padding: 8px 16px; border-radius: 30px; transition: 0.2s; }
        .bottom-nav a.active { color: #ef4444; background: rgba(239,68,68,0.1); }
    </style>
</head>
<body>
<div class="app-container">
    <div class="page-header">
        <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-right"></i></button>
        <h1><i class="fas fa-database"></i> الخزنة الصحية</h1>
    </div>

    <div id="fileList">
        <div class="file-item">
            <div class="info"><div class="name">تقرير طبي - يوليو 2026</div><div class="date">📅 15/07/2026</div></div>
            <button class="btn-download" onclick="alert('📥 جاري التحميل...')">تحميل</button>
        </div>
        <div class="file-item">
            <div class="info"><div class="name">نتائج تحاليل الدم</div><div class="date">📅 10/07/2026</div></div>
            <button class="btn-download" onclick="alert('📥 جاري التحميل...')">تحميل</button>
        </div>
        <div class="file-item">
            <div class="info"><div class="name">أشعة الصدر</div><div class="date">📅 05/07/2026</div></div>
            <button class="btn-download" onclick="alert('📥 جاري التحميل...')">تحميل</button>
        </div>
    </div>

    <button class="btn-upload" onclick="alert('📤 سيتم فتح نافذة رفع الملفات')"><i class="fas fa-upload"></i> رفع ملف جديد</button>

    <nav class="bottom-nav">
        <a href="../index.html"><i class="fas fa-home"></i></a>
        <a href="../map.html"><i class="fas fa-map"></i></a>
        <a href="../settings.html"><i class="fas fa-cog"></i></a>
        <a href="#" class="active"><i class="fas fa-database"></i></a>
    </nav>
</div>

        <script>
        const API_BASE = 'http://localhost:5000/api';
        function getToken() { return localStorage.getItem('token'); }
        async function loadFiles() {
            const token = getToken();
            if (!token) return;
            try {
                const res = await fetch(`${API_BASE}/medical-records`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success && data.data.length > 0) {
                    const list = document.getElementById('fileList');
                    if (list) {
                        list.innerHTML = '';
                        data.data.forEach(file => {
                            const div = document.createElement('div');
                            div.className = 'file-item';
                            div.innerHTML = `
                                <div class="info">
                                    <div class="name">${file.title}</div>
                                    <div class="date">📅 ${new Date(file.created_at).toLocaleDateString('ar-EG')}</div>
                                </div>
                                <button class="btn-download" onclick="alert('📥 جاري تحميل: ${file.title}')">تحميل</button>
                            `;
                            list.appendChild(div);
                        });
                    }
                }
            } catch (err) { console.error(err); }
        }
        document.addEventListener('DOMContentLoaded', loadFiles);
        </script>
        
</body>
</html>
