<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>منظم الأدوية - Doctor.ai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../../CSS/style.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Cairo',sans-serif; background:#f2f4f8; direction:rtl; padding:16px; min-height:100vh; }
        .app-container { max-width:480px; margin:0 auto; background:#fff; border-radius:28px; padding:20px; box-shadow:0 8px 40px rgba(0,0,0,0.06); }
        .header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
        .header .back { background:none; border:none; font-size:20px; color:#0d9488; cursor:pointer; }
        .header .title { font-size:20px; font-weight:700; color:#1e293b; flex:1; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .form-group { margin-bottom:12px; }
        .form-group label { display:block; font-weight:600; color:#1e293b; font-size:13px; margin-bottom:4px; }
        .form-group input { width:100%; padding:10px; border:2px solid #e5e7eb; border-radius:12px; font-size:14px; background:#f9fafb; }
        .btn-primary { width:100%; padding:12px; background:#0d9488; color:#fff; border:none; border-radius:14px; font-size:16px; font-weight:600; cursor:pointer; }
        .reminder-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #f1f5f9; }
        .reminder-item .info { font-size:14px; }
        .reminder-item .info strong { color:#0d9488; }
        .reminder-item .delete { color:#ef4444; cursor:pointer; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <button class="back" onclick="window.history.back()"><i class="fas fa-arrow-right"></i></button>
        <div class="title">💊 منظم الأدوية</div>
    </div>
    <div class="form-row">
        <div class="form-group"><label><i class="fas fa-pills"></i> الدواء</label><input type="text" id="medName" placeholder="ميتفورمين" /></div>
        <div class="form-group"><label><i class="fas fa-syringe"></i> الجرعة</label><input type="text" id="medDose" placeholder="500 مجم" /></div>
    </div>
    <div class="form-row">
        <div class="form-group"><label><i class="fas fa-clock"></i> الوقت</label><input type="time" id="medTime" /></div>
        <div class="form-group"><label><i class="fas fa-calendar"></i> التكرار</label>
            <select id="medRepeat" style="width:100%;padding:10px;border:2px solid #e5e7eb;border-radius:12px;font-size:14px;">
                <option value="daily">يومياً</option>
                <option value="twice">مرتين يومياً</option>
                <option value="weekly">أسبوعياً</option>
            </select>
        </div>
    </div>
    <button class="btn-primary" onclick="addReminder()"><i class="fas fa-plus-circle"></i> إضافة تذكير</button>
    <div id="reminderList" style="margin-top:16px;"></div>
</div>
<script>
function loadReminders() {
    const list = JSON.parse(localStorage.getItem('medReminders') || '[]');
    const container = document.getElementById('reminderList');
    if (list.length === 0) { container.innerHTML = '<p style="color:#94a3b8;text-align:center;">لا توجد تذكيرات</p>'; return; }
    container.innerHTML = '';
    list.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'reminder-item';
        div.innerHTML = `
            <div class="info"><strong>${item.name}</strong> - ${item.dose} | ⏰ ${item.time} | 📆 ${item.repeat}</div>
            <span class="delete" onclick="deleteReminder(${index})"><i class="fas fa-trash"></i></span>
        `;
        container.appendChild(div);
    });
}
function addReminder() {
    const name = document.getElementById('medName').value.trim();
    const dose = document.getElementById('medDose').value.trim();
    const time = document.getElementById('medTime').value;
    const repeat = document.getElementById('medRepeat').value;
    if (!name || !time) { alert('❌ أدخل اسم الدواء والوقت'); return; }
    const list = JSON.parse(localStorage.getItem('medReminders') || '[]');
    list.push({ name, dose: dose || 'غير محدد', time, repeat });
    localStorage.setItem('medReminders', JSON.stringify(list));
    document.getElementById('medName').value = ''; document.getElementById('medDose').value = ''; document.getElementById('medTime').value = '';
    loadReminders();
    // طلب إذن الإشعارات
    if (Notification.permission === 'default') Notification.requestPermission();
    if (Notification.permission === 'granted') new Notification('✅ تم إضافة تذكير', { body: `دواء ${name} في ${time}` });
}
function deleteReminder(index) {
    const list = JSON.parse(localStorage.getItem('medReminders') || '[]');
    list.splice(index, 1);
    localStorage.setItem('medReminders', JSON.stringify(list));
    loadReminders();
}
document.addEventListener('DOMContentLoaded', loadReminders);
</script>
</body>
</html>
