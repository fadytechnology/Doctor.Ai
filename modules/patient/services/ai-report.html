<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>التقرير الذكي - Doctor.ai</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../../../CSS/style.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f2f4f8; direction: rtl; padding: 16px; min-height: 100vh; }
        .app-container { max-width: 480px; margin: 0 auto; }
        .page-header { background: #fff; padding: 16px; border-radius: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
        .page-header .back-btn { background: #f1f5f9; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; color: #1e293b; cursor: pointer; }
        .page-header h1 { font-size: 20px; font-weight: 700; color: #1e293b; margin: 0; flex: 1; }
        .page-header h1 i { color: #8b5cf6; }
        .report-card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); margin-bottom: 12px; }
        .report-card .title { font-weight: 700; font-size: 16px; color: #1e293b; }
        .report-card .value { font-size: 22px; font-weight: 800; color: #0d9488; margin: 4px 0; }
        .report-card .status { font-size: 13px; padding: 2px 12px; border-radius: 30px; display: inline-block; }
        .status.good { background: #dcfce7; color: #166534; }
        .status.warning { background: #fef3c7; color: #92400e; }
        .btn-generate { width: 100%; padding: 14px; background: #8b5cf6; color: #fff; border: none; border-radius: 14px; font-weight: 600; cursor: pointer; }
        .bottom-nav { display: flex; justify-content: space-around; align-items: center; background: #fff; padding: 10px 0; border-radius: 30px; box-shadow: 0 -2px 12px rgba(0,0,0,0.04); margin-top: 16px; }
        .bottom-nav a { color: #94a3b8; font-size: 22px; text-decoration: none; padding: 8px 16px; border-radius: 30px; transition: 0.2s; }
        .bottom-nav a.active { color: #8b5cf6; background: rgba(139,92,246,0.1); }
    </style>
</head>
<body>
<div class="app-container">
    <div class="page-header">
        <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-right"></i></button>
        <h1><i class="fas fa-robot"></i> التقرير الذكي</h1>
    </div>

    <div class="report-card">
        <div class="title">🩸 السكر التراكمي</div>
        <div class="value">5.7%</div>
        <span class="status good">✅ ممتاز</span>
    </div>
    <div class="report-card">
        <div class="title">❤️ ضغط الدم</div>
        <div class="value">120/80 مم زئبق</div>
        <span class="status good">✅ طبيعي</span>
    </div>
    <div class="report-card">
        <div class="title">📊 مؤشر كتلة الجسم</div>
        <div class="value">22.5</div>
        <span class="status good">✅ وزن مثالي</span>
    </div>

    <button class="btn-generate" onclick="alert('📊 جاري توليد التقرير الكامل...')"><i class="fas fa-file-pdf"></i> توليد تقرير كامل</button>

    <nav class="bottom-nav">
        <a href="../index.html"><i class="fas fa-home"></i></a>
        <a href="../map.html"><i class="fas fa-map"></i></a>
        <a href="../settings.html"><i class="fas fa-cog"></i></a>
        <a href="#" class="active"><i class="fas fa-robot"></i></a>
    </nav>
</div>

        <script>
        const API_BASE = 'http://localhost:5000/api';
        function getToken() { return localStorage.getItem('token'); }
        async function generateReport() {
            const token = getToken();
            if (!token) return alert('يرجى تسجيل الدخول');
            try {
                const bioRes = await fetch(`${API_BASE}/biometric`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const bioData = await bioRes.json();
                let html = '<div class="report-result">';
                if (bioData.success && bioData.data) {
                    const d = bioData.data;
                    if (d.weight && d.height) {
                        const bmi = (d.weight / ((d.height/100) ** 2));
                        let status = 'طبيعي';
                        if (bmi < 18.5) status = 'نحيف';
                        else if (bmi < 25) status = 'طبيعي';
                        else if (bmi < 30) status = 'زيادة وزن';
                        else status = 'سمنة';
                        html += `<div class="report-item">📊 مؤشر كتلة الجسم: <strong>${bmi.toFixed(1)}</strong> - ${status}</div>`;
                    }
                    if (d.blood_pressure_systolic && d.blood_pressure_diastolic) {
                        let bpStatus = 'طبيعي';
                        if (d.blood_pressure_systolic > 140) bpStatus = 'مرتفع';
                        else if (d.blood_pressure_systolic < 90) bpStatus = 'منخفض';
                        html += `<div class="report-item">❤️ ضغط الدم: ${d.blood_pressure_systolic}/${d.blood_pressure_diastolic} - ${bpStatus}</div>`;
                    }
                    if (d.sugar) {
                        let sugarStatus = d.sugar < 100 ? 'طبيعي' : 'مرتفع';
                        html += `<div class="report-item">🩸 السكر: ${d.sugar} - ${sugarStatus}</div>`;
                    }
                } else {
                    html += '<div class="report-item">⚠️ لا توجد قياسات كافية لتوليد التقرير</div>';
                }
                html += '</div>';
                const container = document.getElementById('reportContainer');
                if (container) container.innerHTML = html;
            } catch (err) {
                alert('❌ حدث خطأ في توليد التقرير');
                console.error(err);
            }
        }
        document.addEventListener('DOMContentLoaded', generateReport);
        window.generateReport = generateReport;
        </script>
        
</body>
</html>
