<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>متابعة العلاج - Doctor.ai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../../CSS/style.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Cairo',sans-serif; background:#f2f4f8; direction:rtl; padding:16px; min-height:100vh; }
        .app-container { max-width:480px; margin:0 auto; background:#fff; border-radius:28px; padding:20px; box-shadow:0 8px 40px rgba(0,0,0,0.06); }
        .header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
        .header .back { background:none; border:none; font-size:20px; color:#0d9488; cursor:pointer; }
        .header .title { font-size:20px; font-weight:700; color:#1e293b; flex:1; }
        .form-group { margin-bottom:12px; }
        .form-group label { display:block; font-weight:600; color:#1e293b; font-size:13px; margin-bottom:4px; }
        .form-group input, .form-group select { width:100%; padding:10px; border:2px solid #e5e7eb; border-radius:12px; font-size:14px; background:#f9fafb; }
        .btn-primary { width:100%; padding:12px; background:#0d9488; color:#fff; border:none; border-radius:14px; font-size:16px; font-weight:600; cursor:pointer; }
        .treatment-item { padding:8px 0; border-bottom:1px solid #f1f5f9; display:flex; justify-content:space-between; font-size:14px; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <button class="back" onclick="window.history.back()"><i class="fas fa-arrow-right"></i></button>
        <div class="title">📊 متابعة كفاءة العلاج</div>
    </div>
    <div class="form-group"><label><i class="fas fa-pills"></i> اسم الدواء</label><input type="text" id="drugName" placeholder="ميتفورمين" /></div>
    <div class="form-group"><label><i class="fas fa-calendar"></i> تاريخ البدء</label><input type="date" id="startDate" /></div>
    <div class="form-group"><label><i class="fas fa-check-circle"></i> حالة الالتزام</label>
        <select id="compliance"><option value="ملتزم">ملتزم</option><option value="غير ملتزم">غير ملتزم</option><option value="قيد المراجعة">قيد المراجعة</option></select>
    </div>
    <button class="btn-primary" onclick="addTreatment()"><i class="fas fa-plus-circle"></i> إضافة متابعة</button>
    <div style="margin-top:16px;"><h4 style="font-size:14px;color:#1e293b;">📋 سجل المتابعة</h4><div id="treatmentList"></div></div>
</div>
<script>
function loadTreatments() {
    const list = JSON.parse(localStorage.getItem('treatmentMonitor') || '[]');
    const container = document.getElementById('treatmentList');
    if (list.length === 0) { container.innerHTML = '<p style="color:#94a3b8;font-size:13px;text-align:center;">لا توجد متابعات مسجلة</p>'; return; }
    container.innerHTML = '';
    list.forEach(item => {
        const div = document.createElement('div');
        div.className = 'treatment-item';
        div.innerHTML = `<span>${item.drug} - ${item.date}</span><span style="color:${item.compliance === 'ملتزم' ? '#065f46' : '#dc2626'};">${item.compliance}</span>`;
        container.appendChild(div);
    });
}
function addTreatment() {
    const drug = document.getElementById('drugName').value.trim();
    const date = document.getElementById('startDate').value;
    const compliance = document.getElementById('compliance').value;
    if (!drug) { alert('❌ أدخل اسم الدواء'); return; }
    const list = JSON.parse(localStorage.getItem('treatmentMonitor') || '[]');
    list.push({ drug, date: date || new Date().toISOString().split('T')[0], compliance, createdAt: new Date().toISOString() });
    localStorage.setItem('treatmentMonitor', JSON.stringify(list));
    document.getElementById('drugName').value = ''; document.getElementById('startDate').value = '';
    loadTreatments();
    alert('✅ تم إضافة متابعة العلاج');
}
document.addEventListener('DOMContentLoaded', loadTreatments);
</script>
</body>
</html>
