<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>شبكتي الصحية - Doctor.ai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../../CSS/style.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Cairo',sans-serif; background:#f2f4f8; direction:rtl; padding:16px; min-height:100vh; }
        .app-container { max-width:480px; margin:0 auto; background:#fff; border-radius:28px; padding:20px; box-shadow:0 8px 40px rgba(0,0,0,0.06); }
        .header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
        .header .back { background:none; border:none; font-size:20px; color:#0d9488; cursor:pointer; }
        .header .title { font-size:20px; font-weight:700; color:#1e293b; flex:1; }
        .my-code-box { background:linear-gradient(135deg,#0d9488,#0f766e); border-radius:16px; padding:16px; color:#fff; text-align:center; margin-bottom:16px; }
        .my-code-box .code { font-size:28px; font-weight:800; letter-spacing:2px; background:rgba(255,255,255,0.15); padding:8px; border-radius:12px; display:inline-block; margin-top:4px; }
        .my-code-box .copy { background:rgba(255,255,255,0.2); border:none; color:#fff; padding:4px 16px; border-radius:20px; cursor:pointer; font-size:12px; margin-top:8px; }
        .form-row { display:grid; grid-template-columns:3fr 1fr; gap:10px; }
        .form-group { margin-bottom:12px; }
        .form-group label { display:block; font-weight:600; color:#1e293b; font-size:13px; margin-bottom:4px; }
        .form-group input, .form-group select { width:100%; padding:10px; border:2px solid #e5e7eb; border-radius:12px; font-size:14px; background:#f9fafb; }
        .form-group input:focus { outline:none; border-color:#0d9488; }
        .btn-primary { padding:10px 16px; background:#0d9488; color:#fff; border:none; border-radius:12px; font-size:14px; font-weight:600; cursor:pointer; }
        .btn-danger { padding:4px 12px; background:#ef4444; color:#fff; border:none; border-radius:20px; font-size:11px; cursor:pointer; }
        .partner-item { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #f1f5f9; }
        .partner-item .info .name { font-weight:700; color:#1e293b; }
        .partner-item .info .type { font-size:12px; color:#64748b; }
        .partner-item .status { font-size:12px; padding:2px 12px; border-radius:12px; }
        .status.active { background:#d1fae5; color:#065f46; }
        .status.pending { background:#fef3c7; color:#92400e; }
        .status.rejected { background:#fecaca; color:#991b1b; }
        .empty-state { text-align:center; padding:20px 0; color:#94a3b8; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <button class="back" onclick="window.history.back()"><i class="fas fa-arrow-right"></i></button>
        <div class="title">🔗 شبكتي الصحية</div>
    </div>

    <!-- كود التعاون الخاص بالصيدلي/المريض -->
    <div class="my-code-box">
        <div style="font-size:13px;opacity:0.8;">كود التعاون الخاص بك</div>
        <div class="code" id="myCode">DR-1001</div>
        <button class="copy" onclick="copyCode()"><i class="fas fa-copy"></i> نسخ الكود</button>
    </div>

    <!-- إضافة جهة جديدة -->
    <div class="form-row">
        <div class="form-group" style="margin-bottom:0;">
            <input type="text" id="partnerCode" placeholder="أدخل كود التعاون (مثل: PH-12345)" />
        </div>
        <button class="btn-primary" onclick="addPartner()"><i class="fas fa-plus"></i> إضافة</button>
    </div>
    <div style="margin:8px 0 16px;display:flex;gap:6px;flex-wrap:wrap;">
        <select id="partnerType" style="padding:8px;border:2px solid #e5e7eb;border-radius:10px;font-size:13px;flex:1;">
            <option value="pharmacy">صيدلية</option>
            <option value="clinic">عيادة</option>
            <option value="lab">معمل</option>
            <option value="radiology">مركز أشعة</option>
        </select>
    </div>

    <!-- قائمة الجهات المرتبطة -->
    <div id="partnerList"></div>
</div>
<script>
// ===== شبكتي الصحية =====
function getPartners() {
    return JSON.parse(localStorage.getItem('myNetwork') || '[]');
}
function savePartners(list) {
    localStorage.setItem('myNetwork', JSON.stringify(list));
}
function renderPartners() {
    const list = getPartners();
    const container = document.getElementById('partnerList');
    if (list.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-users" style="font-size:32px;display:block;margin-bottom:8px;color:#cbd5e1;"></i> لم ترتبط بأي جهة بعد.<br>أدخل كود التعاون أعلاه للربط.</div>';
        return;
    }
    container.innerHTML = '';
    list.forEach((p, index) => {
        const div = document.createElement('div');
        div.className = 'partner-item';
        const typeMap = { pharmacy:'صيدلية', clinic:'عيادة', lab:'معمل', radiology:'مركز أشعة' };
        const statusMap = { active:'نشط', pending:'قيد الانتظار', rejected:'مرفوض' };
        div.innerHTML = `
            <div class="info">
                <div class="name">${p.name || typeMap[p.type] || 'جهة غير معروفة'}</div>
                <div class="type">${typeMap[p.type] || p.type} | كود: ${p.code}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
                <span class="status ${p.status}">${statusMap[p.status] || p.status}</span>
                <button class="btn-danger" onclick="removePartner(${index})"><i class="fas fa-unlink"></i></button>
            </div>
        `;
        container.appendChild(div);
    });
}
function addPartner() {
    const code = document.getElementById('partnerCode').value.trim().toUpperCase();
    const type = document.getElementById('partnerType').value;
    if (!code) { alert('❌ يرجى إدخال كود التعاون'); return; }
    // محاكاة كود تعاون (في الواقع هنروح للسيرفر)
    // نتحقق من وجود الكود في قاعدة بيانات وهمية
    const validCodes = {
        'PH-12345': { name: 'صيدلية النور', type: 'pharmacy' },
        'CL-67890': { name: 'عيادة السلام', type: 'clinic' },
        'LB-11111': { name: 'معمل المختبر', type: 'lab' },
        'RD-22222': { name: 'مركز الأشعة الحديث', type: 'radiology' }
    };
    if (!validCodes[code]) {
        alert('❌ كود التعاون غير صحيح أو غير موجود. تأكد من كتابته بشكل صحيح.');
        return;
    }
    const partner = validCodes[code];
    if (partner.type !== type) {
        alert(`❌ هذا الكود خاص بـ ${partner.type === 'pharmacy' ? 'صيدلية' : partner.type === 'clinic' ? 'عيادة' : partner.type === 'lab' ? 'معمل' : 'مركز أشعة'}، لكنك اخترت نوع مختلف.`);
        return;
    }
    const list = getPartners();
    if (list.find(p => p.code === code)) {
        alert('⚠️ هذه الجهة مرتبطة بالفعل.');
        return;
    }
    list.push({
        code: code,
        name: partner.name,
        type: partner.type,
        status: 'active', // أو 'pending' حسب موافقة الطرف الآخر في النسخة الكاملة
        date: new Date().toISOString()
    });
    savePartners(list);
    document.getElementById('partnerCode').value = '';
    renderPartners();
    alert(`✅ تم ربط ${partner.name} بنجاح!`);
}
function removePartner(index) {
    if (!confirm('هل أنت متأكد من إلغاء ربط هذه الجهة؟')) return;
    const list = getPartners();
    list.splice(index, 1);
    savePartners(list);
    renderPartners();
}
function copyCode() {
    const code = document.getElementById('myCode').textContent;
    if (navigator.clipboard) {
        navigator.clipboard.writeText(code).then(() => alert('✅ تم نسخ الكود: ' + code));
    } else {
        alert('🔑 كودك هو: ' + code);
    }
}
document.addEventListener('DOMContentLoaded', function() {
    // توليد كود عشوائي للمريض (لو مش موجود)
    let code = localStorage.getItem('myPatientCode');
    if (!code) {
        code = 'DR-' + Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('myPatientCode', code);
    }
    document.getElementById('myCode').textContent = code;
    renderPartners();
    console.log('✅ شبكتي الصحية جاهزة');
});
</script>
</body>
</html>
