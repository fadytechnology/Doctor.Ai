<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>المتجر - Doctor.ai</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../../../CSS/style.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f2f4f8; direction: rtl; padding: 16px; min-height: 100vh; }
        .app-container { max-width: 480px; margin: 0 auto; }
        .page-header { background: #fff; padding: 16px; border-radius: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
        .page-header .back-btn { background: #f1f5f9; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; color: #1e293b; cursor: pointer; }
        .page-header h1 { font-size: 20px; font-weight: 700; color: #1e293b; margin: 0; flex: 1; }
        .page-header h1 i { color: #f59e0b; }
        .product-item { background: #fff; padding: 14px; border-radius: 16px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); display: flex; justify-content: space-between; align-items: center; }
        .product-item .info .name { font-weight: 600; }
        .product-item .info .price { font-size: 14px; color: #0d9488; font-weight: 700; }
        .product-item .btn-buy { background: #0d9488; color: #fff; border: none; padding: 6px 16px; border-radius: 30px; font-size: 12px; cursor: pointer; }
        .bottom-nav { display: flex; justify-content: space-around; align-items: center; background: #fff; padding: 10px 0; border-radius: 30px; box-shadow: 0 -2px 12px rgba(0,0,0,0.04); margin-top: 16px; }
        .bottom-nav a { color: #94a3b8; font-size: 22px; text-decoration: none; padding: 8px 16px; border-radius: 30px; transition: 0.2s; }
        .bottom-nav a.active { color: #f59e0b; background: rgba(245,158,11,0.1); }
    </style>
</head>
<body>
<div class="app-container">
    <div class="page-header">
        <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-right"></i></button>
        <h1><i class="fas fa-store"></i> المتجر</h1>
    </div>

    
    <div id="productList" class="product-list">
        <div class="loading">⏳ جاري تحميل المنتجات...</div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        const token = localStorage.getItem('token');

        async function loadProducts() {
            const list = document.getElementById('productList');
            try {
                const res = await fetch(`${API_BASE}/inventory/search?q=all`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (!data.success || data.results.length === 0) {
                    list.innerHTML = '<div class="empty">😔 لا توجد منتجات متاحة حالياً</div>';
                    return;
                }
                list.innerHTML = '';
                data.results.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'product-item';
                    div.innerHTML = `
                        <div class="info">
                            <div class="name">${item.drug_name}</div>
                            <div class="price">💰 ${item.price} ج.م</div>
                            <div class="pharmacy">🏪 ${item.pharmacy_name}</div>
                        </div>
                        <button class="btn-buy" onclick="alert('🛒 تم إضافة المنتج إلى السلة')">شراء</button>
                    `;
                    list.appendChild(div);
                });
            } catch (err) {
                list.innerHTML = '<div class="error">❌ حدث خطأ في تحميل المنتجات</div>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>

    <style>
        .product-list { padding: 10px 0; }
        .product-item { background: #fff; padding: 14px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
        .product-item .info .name { font-weight: 600; }
        .product-item .info .price { font-size: 14px; color: #0d9488; font-weight: 700; }
        .product-item .info .pharmacy { font-size: 12px; color: #94a3b8; }
        .product-item .btn-buy { background: #0d9488; color: #fff; border: none; padding: 6px 16px; border-radius: 30px; font-size: 12px; cursor: pointer; }
        .loading, .empty, .error { text-align: center; padding: 30px; color: #94a3b8; }
        .error { color: #dc2626; }
    </style>
    <div class="price">💰 15 ج.م</div></div>
            <button class="btn-buy" onclick="alert('🛒 تم إضافة المنتج')">شراء</button>
        </div>
        <div class="product-item">
            <div class="info"><div class="name">فيتامين C 1000mg</div><div class="price">💰 25 ج.م</div></div>
            <button class="btn-buy" onclick="alert('🛒 تم إضافة المنتج')">شراء</button>
        </div>
        <div class="product-item">
            <div class="info"><div class="name">أموكسيسيلين 250mg</div><div class="price">💰 40 ج.م</div></div>
            <button class="btn-buy" onclick="alert('🛒 تم إضافة المنتج')">شراء</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="../index.html"><i class="fas fa-home"></i></a>
        <a href="../map.html"><i class="fas fa-map"></i></a>
        <a href="../settings.html"><i class="fas fa-cog"></i></a>
        <a href="#" class="active"><i class="fas fa-store"></i></a>
    </nav>
</div>
</body>
</html>
