<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>حاسبة الجرعات للأطفال - Doctor.ai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../../CSS/style.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Cairo',sans-serif; background:#f2f4f8; direction:rtl; padding:16px; min-height:100vh; }
        .app-container { max-width:480px; margin:0 auto; background:#fff; border-radius:28px; padding:20px; box-shadow:0 8px 40px rgba(0,0,0,0.06); }
        .header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
        .header .back { background:none; border:none; font-size:20px; color:#0d9488; cursor:pointer; }
        .header .title { font-size:20px; font-weight:700; color:#1e293b; flex:1; }
        .form-group { margin-bottom:14px; }
        .form-group label { display:block; font-weight:600; color:#1e293b; font-size:13px; margin-bottom:4px; }
        .form-group input, .form-group select { width:100%; padding:10px 14px; border:2px solid #e5e7eb; border-radius:12px; font-size:14px; background:#f9fafb; }
        .form-group input:focus { outline:none; border-color:#0d9488; }
        .btn-primary { width:100%; padding:14px; background:#0d9488; color:#fff; border:none; border-radius:14px; font-size:16px; font-weight:600; cursor:pointer; }
        .result-box { background:#ecfdf5; border-radius:16px; padding:16px; margin-top:16px; border-right:4px solid #0d9488; }
        .result-box .item { display:flex; justify-content:space-between; padding:6px 0; font-size:14px; border-bottom:1px solid #d1fae5; }
        .result-box .item:last-child { border-bottom:none; }
        .result-box .label { color:#065f46; font-weight:600; }
        .result-box .value { color:#0d9488; font-weight:700; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <button class="back" onclick="window.history.back()"><i class="fas fa-arrow-right"></i></button>
        <div class="title">⚕️ حاسبة الجرعات للأطفال</div>
    </div>
    <div class="form-group"><label><i class="fas fa-weight"></i> وزن الطفل (كجم)</label><input type="number" id="weight" step="0.5" placeholder="مثال: 15" /></div>
    <div class="form-group"><label><i class="fas fa-calendar-alt"></i> العمر (سنوات)</label><input type="number" id="age" placeholder="مثال: 4" /></div>
    <div class="form-group"><label><i class="fas fa-pills"></i> نوع الدواء</label>
        <select id="drugType">
            <option value="paracetamol">باراسيتامول (15 مجم/كجم)</option>
            <option value="ibuprofen">إيبوبروفين (10 مجم/كجم)</option>
            <option value="amoxicillin">أموكسيسيلين (20 مجم/كجم)</option>
        </select>
    </div>
    <button class="btn-primary" onclick="calculateDose()"><i class="fas fa-calculator"></i> حساب الجرعة</button>
    <div id="resultContainer"></div>
</div>
<script>
function calculateDose() {
    const weight = parseFloat(document.getElementById('weight').value);
    const age = parseInt(document.getElementById('age').value);
    const drug = document.getElementById('drugType').value;
    if (!weight || weight <= 0) { alert('❌ يرجى إدخال وزن الطفل'); return; }
    let doseMg, unit = 'مجم', interval = 'كل 6 ساعات', maxDaily = 0;
    let name = 'باراسيتامول';
    if (drug === 'paracetamol') { doseMg = weight * 15; maxDaily = weight * 60; name = 'باراسيتامول'; }
    else if (drug === 'ibuprofen') { doseMg = weight * 10; maxDaily = weight * 30; name = 'إيبوبروفين'; interval = 'كل 8 ساعات'; }
    else if (drug === 'amoxicillin') { doseMg = weight * 20; maxDaily = weight * 80; name = 'أموكسيسيلين'; interval = 'كل 12 ساعة'; }
    const container = document.getElementById('resultContainer');
    container.innerHTML = `
        <div class="result-box">
            <div class="item"><span class="label">💊 الدواء</span><span class="value">${name}</span></div>
            <div class="item"><span class="label">⚖️ الوزن</span><span class="value">${weight} كجم</span></div>
            <div class="item"><span class="label">💉 الجرعة الواحدة</span><span class="value">${doseMg.toFixed(1)} ${unit}</span></div>
            <div class="item"><span class="label">📅 التكرار</span><span class="value">${interval}</span></div>
            <div class="item"><span class="label">⚠️ الحد الأقصى اليومي</span><span class="value">${maxDaily.toFixed(1)} ${unit}</span></div>
            <div style="margin-top:8px;font-size:12px;color:#64748b;">⏳ استشر طبيبك للأطفال دون 3 شهور أو حالات خاصة.</div>
        </div>
    `;
}
</script>
</body>
</html>
