<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>مرحباً في Doctor.ai</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../../CSS/style.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .onboarding-container {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 40px 28px 32px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
        }
        .onboarding-container .logo {
            font-size: 40px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 8px;
        }
        .onboarding-container .logo i {
            color: #fbbf24;
            margin-left: 8px;
        }
        .onboarding-container .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .onboarding-container .illustration {
            font-size: 80px;
            color: #fff;
            margin-bottom: 24px;
            opacity: 0.9;
        }
        .onboarding-container h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .onboarding-container p {
            color: rgba(255, 255, 255, 0.75);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .onboarding-container .features {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 32px;
        }
        .onboarding-container .features .feature {
            background: rgba(255, 255, 255, 0.08);
            padding: 12px 4px;
            border-radius: 16px;
            color: #fff;
            font-size: 12px;
        }
        .onboarding-container .features .feature i {
            font-size: 24px;
            display: block;
            margin-bottom: 4px;
            color: #fbbf24;
        }
        .onboarding-container .btn-start {
            display: block;
            width: 100%;
            padding: 16px;
            background: #fff;
            color: #0d9488;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }
        .onboarding-container .btn-start:hover {
            transform: scale(1.02);
            background: #f0fdf4;
        }
        .onboarding-container .btn-start:active {
            transform: scale(0.98);
        }
        .onboarding-container .skip-link {
            display: block;
            margin-top: 16px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            text-decoration: none;
        }
        .onboarding-container .skip-link:hover {
            color: rgba(255, 255, 255, 0.8);
        }
        @media (max-width: 480px) {
            .onboarding-container { padding: 32px 16px 24px; }
            .onboarding-container .features { grid-template-columns: 1fr 1fr 1fr; }
            .onboarding-container .features .feature { font-size: 11px; padding: 8px 4px; }
        }
    </style>
</head>
<body>
    <div class="onboarding-container">
        <div class="logo"><i class="fas fa-heartbeat"></i> Doctor.<span style="color:#fbbf24;">ai</span></div>
        <div class="subtitle">منصتك الصحية الذكية</div>
        <div class="illustration">
            <i class="fas fa-user-md"></i>
        </div>
        <h1>مرحباً بك</h1>
        <p>تطبيقك الطبي الشامل لإدارة صحتك، التواصل مع الأطباء، وتتبع أدويتك بكل سهولة.</p>
        <div class="features">
            <div class="feature">
                <i class="fas fa-heartbeat"></i>
                قياسات
            </div>
            <div class="feature">
                <i class="fas fa-pills"></i>
                أدوية
            </div>
            <div class="feature">
                <i class="fas fa-comment-dots"></i>
                شات
            </div>
        </div>
        <a href="login.html" class="btn-start">
            <i class="fas fa-arrow-left"></i> ابدأ الآن
        </a>
        <a href="index.html" class="skip-link">تخطي ←</a>
    </div>
</body>
</html>
