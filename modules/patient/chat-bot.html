<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>المساعد الطبي - Doctor.ai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../../CSS/style.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Cairo',sans-serif; background:#f2f4f8; direction:rtl; padding:16px; min-height:100vh; }
        .app-container { max-width:480px; margin:0 auto; background:#fff; border-radius:28px; padding:20px; box-shadow:0 8px 40px rgba(0,0,0,0.06); }
        .header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
        .header .back { background:none; border:none; font-size:20px; color:#0d9488; cursor:pointer; }
        .header .title { font-size:20px; font-weight:700; color:#1e293b; flex:1; }
        .chat-container { height:380px; overflow-y:auto; padding:10px; background:#f8fafc; border-radius:16px; margin-bottom:12px; display:flex; flex-direction:column; gap:8px; }
        .msg { max-width:85%; padding:10px 14px; border-radius:16px; font-size:14px; line-height:1.6; animation:fadeIn 0.3s ease; }
        .msg.user { background:#0d9488; color:#fff; align-self:flex-end; border-bottom-left-radius:4px; }
        .msg.bot { background:#f1f5f9; color:#1e293b; align-self:flex-start; border-bottom-right-radius:4px; }
        .msg .time { font-size:10px; opacity:0.6; display:block; margin-top:4px; }
        .input-area { display:flex; gap:10px; }
        .input-area input { flex:1; padding:12px 16px; border:2px solid #e5e7eb; border-radius:14px; font-size:15px; outline:none; background:#f9fafb; }
        .input-area input:focus { border-color:#0d9488; background:#fff; }
        .input-area button { padding:12px 20px; background:#0d9488; color:#fff; border:none; border-radius:14px; font-size:16px; cursor:pointer; }
        .quick-btns { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
        .quick-btns button { background:#ecfdf5; color:#0d9488; border:1px solid #d1fae5; padding:4px 12px; border-radius:20px; font-size:12px; cursor:pointer; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        .empty-state { text-align:center; color:#94a3b8; padding:40px 0; }
        .empty-state i { font-size:48px; display:block; margin-bottom:12px; color:#cbd5e1; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <button class="back" onclick="window.history.back()"><i class="fas fa-arrow-right"></i></button>
        <div class="title">🩺 المساعد الطبي</div>
    </div>
    <div class="chat-container" id="chatContainer">
        <div class="empty-state"><i class="fas fa-comment-medical"></i> اسألني عن أي حاجة صحية</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="اكتب سؤالك..." onkeydown="if(event.key==='Enter') sendMessage()" />
        <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
    <div class="quick-btns">
        <button onclick="askQuick('اعراض البرد')">🤧 اعراض البرد</button>
        <button onclick="askQuick('جرعة الباراسيتامول')">💊 جرعة باراسيتامول</button>
        <button onclick="askQuick('اعراض الانفلونزا')">🤒 اعراض الانفلونزا</button>
        <button onclick="askQuick('علاج الصداع')">🤕 علاج الصداع</button>
    </div>
</div>
<script>
const botResponses = {
    'اعراض البرد': '🤧 أعراض البرد: سيلان الأنف، عطس، احتقان، كحة خفيفة، وأحياناً حرارة خفيفة. اشرب سوائل دافئة وخذ قسطاً من الراحة.',
    'جرعة الباراسيتامول': '💊 الجرعة المعتادة للبالغين: 500-1000 مجم كل 4-6 ساعات (بحد أقصى 4000 مجم يومياً). استشر طبيبك للأطفال.',
    'اعراض الانفلونزا': '🤒 أعراض الانفلونزا: حرارة عالية، آلام عضلية، صداع شديد، كحة جافة، وتعب عام. يفضل الراحة وشرب السوائل.',
    'علاج الصداع': '🤕 للصداع: اشرب مياه كافية، خذ قسطاً من الراحة في مكان مظلم، ويمكنك استخدام كمادات باردة. إذا استمر، استشر طبيبك.',
    'مرحباً': '👋 أهلاً بك! كيف يمكنني مساعدتك اليوم؟',
    'السلام عليكم': '👋 وعليكم السلام ورحمة الله! كيف يمكنني خدمتك؟',
    'شكراً': '🙂 العفو! أنا هنا لمساعدتك أي وقت.',
};
function getBotReply(text) {
    const lower = text.toLowerCase();
    for (const [key, reply] of Object.entries(botResponses)) {
        if (lower.includes(key)) return reply;
    }
    return '🤔 أنا آسف، لم أفهم سؤالك. حاول أن تسأل بطريقة مختلفة أو اختر من الأسئلة السريعة أعلاه.';
}
function addMessage(text, sender) {
    const container = document.getElementById('chatContainer');
    const empty = container.querySelector('.empty-state');
    if (empty) empty.remove();
    const div = document.createElement('div');
    div.className = `msg ${sender}`;
    const time = new Date().toLocaleTimeString('ar-EG', { hour:'2-digit', minute:'2-digit' });
    div.innerHTML = `${text}<span class="time">${time}</span>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}
function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;
    addMessage(text, 'user');
    input.value = '';
    setTimeout(() => {
        const reply = getBotReply(text);
        addMessage(reply, 'bot');
    }, 400);
}
function askQuick(question) {
    document.getElementById('userInput').value = question;
    sendMessage();
}
document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => addMessage('👋 مرحباً! أنا مساعدك الطبي. اسألني عن أي شيء يخص صحتك.', 'bot'), 500);
});
</script>
</body>
</html>
