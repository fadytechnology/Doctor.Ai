<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>مركز الخدمات - Doctor.ai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../CSS/style.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f2f4f8; direction: rtl; padding: 16px; min-height: 100vh; }
        .app-container { max-width: 480px; margin: 0 auto; }
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .header .back { background: none; border: none; font-size: 20px; color: #0d9488; cursor: pointer; }
        .header .title { font-size: 20px; font-weight: 700; color: #1e293b; flex: 1; }
        .search-box { width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 16px; font-size: 15px; background: #fff; margin-bottom: 16px; outline: none; }
        .search-box:focus { border-color: #0d9488; }
        .category-title { font-size: 16px; font-weight: 700; color: #0d9488; margin: 16px 0 10px; border-right: 4px solid #0d9488; padding-right: 10px; }
        .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
        .service-card { background: #fff; padding: 14px 6px; border-radius: 16px; text-align: center; cursor: pointer; transition: 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.04); border: 1px solid transparent; }
        .service-card:active { transform: scale(0.94); background: #f8fafc; }
        .service-card i { font-size: 28px; color: #0d9488; display: block; margin-bottom: 4px; }
        .service-card h4 { font-size: 11px; color: #1e293b; font-weight: 600; line-height: 1.3; }
        .service-card .badge { font-size: 9px; background: #d1fae5; color: #065f46; padding: 0 6px; border-radius: 8px; display: inline-block; }
        .service-card.link-card { border-left: 3px solid #f59e0b; }
        .service-card.link-card i { color: #f59e0b; }
        .empty-state { text-align: center; padding: 40px 0; color: #94a3b8; }
        .empty-state i { font-size: 48px; display: block; margin-bottom: 12px; color: #cbd5e1; }
        .service-count { font-size: 12px; color: #94a3b8; background: #f1f5f9; padding: 2px 12px; border-radius: 12px; }
        @media (max-width: 480px) { .services-grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <button class="back" onclick="window.location.href='index.html'"><i class="fas fa-arrow-right"></i></button>
        <div class="title">🌟 مركز الخدمات</div>
    </div>
    <input class="search-box" type="text" id="searchInput" placeholder="🔍 ابحث في الخدمات..." oninput="filterServices(this.value)" />

    <div id="servicesContainer">
        <div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> جاري تحميل الخدمات...</div>
    </div>
</div>

<script>
// ============================================================
// ===== مركز الخدمات (المسار مضبوط) =====
// ============================================================

// محاولة تحميل السجل من المسار الصحيح (الجذر)
let registry = [];
let loading = true;

// نحاول نستدعي السجل من الملف العام
// هنحاول نستخدم الـ <script> اللي تحت، لكن لو مجاش، هنستخدم localStorage
try {
    // لو SERVICES_REGISTRY معرف في الـ window (من السكربت اللي تحت)
    if (typeof SERVICES_REGISTRY !== 'undefined') {
        registry = SERVICES_REGISTRY;
        loading = false;
    } else {
        // نحاول نجيب من localStorage
        const stored = localStorage.getItem('servicesRegistry');
        if (stored) {
            registry = JSON.parse(stored);
            loading = false;
        }
    }
} catch(e) {
    loading = false;
    registry = [];
}

// لو لسه فاضي، نحط بيانات وهمية (عشان متظهرش فاضية)
if (registry.length === 0 && !loading) {
    registry = [
        { id: 'biometric', name: 'الملف البيومتري', icon: 'fa-user-md', category: 'الصحة العامة', description: '' },
        { id: 'ai-report', name: 'التقرير الذكي', icon: 'fa-robot', category: 'الصحة العامة', description: '' },
        { id: 'network', name: 'شبكتي الصحية', icon: 'fa-link', category: 'خدمات الربط', description: '' }
    ];
    localStorage.setItem('servicesRegistry', JSON.stringify(registry));
}

// ----- عرض الخدمات -----
function renderServices(filter = '') {
    const container = document.getElementById('servicesContainer');
    container.innerHTML = '';
    const q = filter.toLowerCase();

    // تجميع حسب الفئة
    const categories = {};
    registry.forEach(s => {
        const cat = s.category || 'أخرى';
        if (!categories[cat]) categories[cat] = [];
        categories[cat].push(s);
    });

    let hasResults = false;
    Object.keys(categories).forEach(cat => {
        const services = categories[cat].filter(s => 
            s.name.includes(q) || (s.description && s.description.includes(q))
        );
        if (services.length === 0) return;
        hasResults = true;
        
        const catDiv = document.createElement('div');
        catDiv.className = 'category-title';
        catDiv.textContent = cat + ' (' + services.length + ')';
        container.appendChild(catDiv);

        const grid = document.createElement('div');
        grid.className = 'services-grid';
        services.forEach(s => {
            const card = document.createElement('div');
            card.className = 'service-card';
            if (cat === 'خدمات الربط' || cat.includes('ربط')) {
                card.classList.add('link-card');
            }
            card.innerHTML = `<i class="fas ${s.icon}"></i><h4>${s.name}</h4>`;
            card.onclick = () => {
                // نفتح صفحة الخدمة
                const url = `service-launcher.html?service=${s.id}`;
                window.location.href = url;
            };
            grid.appendChild(card);
        });
        container.appendChild(grid);
    });

    if (!hasResults) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-search"></i> لا توجد خدمات مطابقة للبحث</div>`;
    }
}

function filterServices(value) {
    renderServices(value);
}

// ----- تحميل الصفحة -----
document.addEventListener('DOMContentLoaded', function() {
    // ننتظر شوية عشان السكربت اللي تحت يتحمل
    setTimeout(() => {
        // نعيد تحميل الـ registry من localStorage (لو اتحدث من السكربت)
        try {
            const stored = localStorage.getItem('servicesRegistry');
            if (stored) {
                const parsed = JSON.parse(stored);
                if (parsed.length > 0) registry = parsed;
            }
        } catch(e) {}
        renderServices();
        console.log('✅ مركز الخدمات (32 خدمة) جاهز!');
    }, 100);
});
</script>

<!-- ===== استيراد السجل من الجذر (المسار الصحيح) ===== -->
<script src="../../JS/services-registry.js"></script>

</body>
</html>
