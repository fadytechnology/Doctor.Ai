<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>مركز الخدمات - Doctor.ai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../CSS/style.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f2f4f8; direction: rtl; padding: 16px; min-height: 100vh; }
        .app-container { max-width: 480px; margin: 0 auto; }
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .header .back { background: none; border: none; font-size: 20px; color: #0d9488; cursor: pointer; padding: 4px; }
        .header .title { font-size: 20px; font-weight: 700; color: #1e293b; flex: 1; }
        .header .badge-count { background: #0d9488; color: #fff; font-size: 12px; padding: 2px 10px; border-radius: 20px; }
        .search-box { width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 16px; font-size: 15px; background: #fff; margin-bottom: 16px; outline: none; transition: 0.3s; }
        .search-box:focus { border-color: #0d9488; }
        .category-title { font-size: 16px; font-weight: 700; color: #0d9488; margin: 16px 0 10px; border-right: 4px solid #0d9488; padding-right: 10px; display: flex; justify-content: space-between; align-items: center; }
        .category-title span { font-size: 12px; color: #94a3b8; font-weight: 400; }
        .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
        .service-card { background: #fff; padding: 14px 6px; border-radius: 16px; text-align: center; cursor: pointer; transition: all 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.04); border: 1px solid transparent; position: relative; overflow: hidden; }
        .service-card:active { transform: scale(0.94); background: #f8fafc; }
        .service-card i { font-size: 28px; color: #0d9488; display: block; margin-bottom: 4px; transition: 0.2s; }
        .service-card:hover i { transform: scale(1.1); }
        .service-card h4 { font-size: 11px; color: #1e293b; font-weight: 600; line-height: 1.3; }
        .service-card.link-card { border-left: 3px solid #f59e0b; }
        .service-card.link-card i { color: #f59e0b; }
        .service-card.link-card h4 { color: #b45309; }
        .empty-state { text-align: center; padding: 40px 0; color: #94a3b8; }
        .empty-state i { font-size: 48px; display: block; margin-bottom: 12px; color: #cbd5e1; }
        @media (max-width: 480px) { .services-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 380px) { .services-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <button class="back" onclick="window.location.href='index.html'">
            <i class="fas fa-arrow-right"></i>
        </button>
        <div class="title">🌟 مركز الخدمات</div>
        <span class="badge-count" id="totalServices">0</span>
    </div>

    <input class="search-box" type="text" id="searchInput" placeholder="🔍 ابحث في الخدمات..." oninput="filterServices(this.value)" />

    <div id="servicesContainer">
        <div class="empty-state">
            <i class="fas fa-spinner fa-pulse"></i>
            جاري تحميل الخدمات...
        </div>
    </div>
</div>

<script>
// ============================================================
// ===== مركز خدمات المريض =====
// ============================================================

// ===== 1. تعريف الخدمات (Registry) مباشرة في الملف =====
// عشان نضمن إن الخدمات تظهر حتى لو ملف JS مش موجود
const SERVICES_DATA = [
    // ===== خدمات ذاتية (22 خدمة) =====
    // الصحة العامة
    { id: 'biometric', name: 'الملف البيومتري', icon: 'fa-user-md', category: 'خدمات ذاتية', url: 'services/biometric-profile.html' },
    { id: 'ai-report', name: 'التقرير الذكي', icon: 'fa-robot', category: 'خدمات ذاتية', url: 'services/ai-report.html' },
    { id: 'symptom-logger', name: 'متابع الأعراض', icon: 'fa-head-side-virus', category: 'خدمات ذاتية', url: 'services/symptom-logger.html' },
    { id: 'health-vault', name: 'الخزنة الطبية', icon: 'fa-cloud-upload-alt', category: 'خدمات ذاتية', url: 'services/health-vault.html' },
    { id: 'ice-card', name: 'كارت الطوارئ', icon: 'fa-phone-alt', category: 'خدمات ذاتية', url: 'services/ice-card.html' },
    // التغذية
    { id: 'calorie-counter', name: 'حاسبة السعرات', icon: 'fa-utensils', category: 'خدمات ذاتية', url: 'services/calorie-counter.html' },
    { id: 'water-tracker', name: 'رادار المياه', icon: 'fa-tint', category: 'خدمات ذاتية', url: 'services/water-tracker.html' },
    { id: 'meal-planner', name: 'مقترح الوجبات', icon: 'fa-apple-alt', category: 'خدمات ذاتية', url: 'services/meal-planner.html' },
    { id: 'sugar-detox', name: 'تحدي السكريات', icon: 'fa-cookie-bite', category: 'خدمات ذاتية', url: 'services/sugar-detox.html' },
    { id: 'fasting-timer', name: 'الصيام المتقطع', icon: 'fa-clock', category: 'خدمات ذاتية', url: 'services/fasting-timer.html' },
    // الأدوية
    { id: 'dosage-calculator', name: 'حاسبة الجرعات', icon: 'fa-calculator', category: 'خدمات ذاتية', url: 'services/dosage-calculator.html' },
    { id: 'interaction-scanner', name: 'كاشف التداخلات', icon: 'fa-exclamation-triangle', category: 'خدمات ذاتية', url: 'services/interaction-scanner.html' },
    { id: 'alternatives-finder', name: 'مكتشف البدائل', icon: 'fa-exchange-alt', category: 'خدمات ذاتية', url: 'services/alternatives-finder.html' },
    { id: 'medication-guide', name: 'دليل الأدوية', icon: 'fa-book-medical', category: 'خدمات ذاتية', url: 'services/medication-guide.html' },
    { id: 'medication-reminder', name: 'منظم الأدوية', icon: 'fa-pills', category: 'خدمات ذاتية', url: 'services/medication-reminder.html' },
    // الصحة النفسية
    { id: 'mood-tracker', name: 'متابع المزاج', icon: 'fa-smile', category: 'خدمات ذاتية', url: 'services/mood-tracker.html' },
    { id: 'breathing-exercises', name: 'تمارين التنفس', icon: 'fa-wind', category: 'خدمات ذاتية', url: 'services/breathing-exercises.html' },
    { id: 'smart-sleep', name: 'منبه النوم الذكي', icon: 'fa-moon', category: 'خدمات ذاتية', url: 'services/smart-sleep.html' },
    // صحة المرأة
    { id: 'period-tracker', name: 'الدورة الشهرية', icon: 'fa-female', category: 'خدمات ذاتية', url: 'services/period-tracker.html' },
    { id: 'baby-care', name: 'رعاية الطفل', icon: 'fa-baby', category: 'خدمات ذاتية', url: 'services/baby-care.html' },
    // أدوات
    { id: 'cost-calculator', name: 'حاسبة التكلفة', icon: 'fa-coins', category: 'خدمات ذاتية', url: 'services/cost-calculator.html' },
    { id: 'step-counter', name: 'عداد الخطوات', icon: 'fa-shoe-prints', category: 'خدمات ذاتية', url: 'services/step-counter.html' },

    // ===== خدمات ربط (10 خدمات) =====
    { id: 'network', name: 'شبكتي الصحية', icon: 'fa-link', category: 'خدمات ربط', url: 'services/network.html' },
    { id: 'store', name: 'الطلب السريع', icon: 'fa-store', category: 'خدمات ربط', url: 'services/store.html' },
    { id: 'wallet', name: 'المحفظة الذكية', icon: 'fa-wallet', category: 'خدمات ربط', url: 'services/wallet.html' },
    { id: 'appointment', name: 'حجز موعد', icon: 'fa-calendar-check', category: 'خدمات ربط', url: 'services/appointment.html' },
    { id: 'lab-order', name: 'طلب تحليل', icon: 'fa-flask', category: 'خدمات ربط', url: 'services/lab-order.html' },
    { id: 'radiology-order', name: 'طلب أشعة', icon: 'fa-x-ray', category: 'خدمات ربط', url: 'services/radiology-order.html' },
    { id: 'share-ehr', name: 'مشاركة الملف الطبي', icon: 'fa-share-alt', category: 'خدمات ربط', url: 'services/share-ehr.html' },
    { id: 'smart-reminder', name: 'منبه العلاج الذكي', icon: 'fa-bell', category: 'خدمات ربط', url: 'services/smart-reminder.html' },
    { id: 'treatment-monitor', name: 'متابعة كفاءة العلاج', icon: 'fa-chart-line', category: 'خدمات ربط', url: 'services/treatment-monitor.html' },
    { id: 'ocr-scanner', name: 'فحص الروشتات (OCR)', icon: 'fa-camera', category: 'خدمات ربط', url: 'services/ocr-scanner.html' }
];

// ===== 2. وظيفة عرض الخدمات =====
function renderServices(filter = '') {
    const container = document.getElementById('servicesContainer');
    container.innerHTML = '';
    const q = filter.trim().toLowerCase();

    // تجميع حسب الفئة
    const categories = {};
    SERVICES_DATA.forEach(s => {
        const cat = s.category || 'أخرى';
        if (!categories[cat]) categories[cat] = [];
        categories[cat].push(s);
    });

    let hasResults = false;
    let totalCount = 0;

    Object.keys(categories).forEach(cat => {
        const services = categories[cat].filter(s =>
            s.name.includes(q) ||
            (s.description && s.description.includes(q))
        );
        if (services.length === 0) return;

        hasResults = true;
        totalCount += services.length;

        // عنوان الفئة
        const catDiv = document.createElement('div');
        catDiv.className = 'category-title';
        catDiv.innerHTML = `${cat} <span>${services.length} خدمة</span>`;
        container.appendChild(catDiv);

        // شبكة الخدمات
        const grid = document.createElement('div');
        grid.className = 'services-grid';

        services.forEach(s => {
            const card = document.createElement('div');
            card.className = 'service-card';
            if (cat === 'خدمات ربط' || cat.includes('ربط')) {
                card.classList.add('link-card');
            }
            card.innerHTML = `
                <i class="fas ${s.icon}"></i>
                <h4>${s.name}</h4>
            `;
            card.onclick = () => {
                if (s.url) {
                    window.location.href = s.url;
                } else {
                    alert('🔜 هذه الخدمة قيد التطوير');
                }
            };
            grid.appendChild(card);
        });

        container.appendChild(grid);
    });

    // تحديث العدد الكلي
    document.getElementById('totalServices').textContent = totalCount;

    if (!hasResults) {
        container.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-search"></i>
                لا توجد خدمات مطابقة للبحث
            </div>
        `;
    }
}

// ===== 3. وظيفة البحث =====
function filterServices(value) {
    renderServices(value);
}

// ===== 4. تحميل الصفحة =====
document.addEventListener('DOMContentLoaded', function() {
    renderServices();
    console.log('✅ مركز الخدمات جاهز (' + SERVICES_DATA.length + ' خدمة)');
});
</script>
</body>
</html>
