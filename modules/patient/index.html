<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>لوحة المريض - Doctor.ai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../CSS/style.css" />
    <style>
        /* ===== تنسيقات صفحة المريض الرئيسية ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f2f4f8; direction: rtl; padding: 16px; min-height: 100vh; }
        .app-container { max-width: 480px; margin: 0 auto; }

        /* الهيدر */
        .patient-header { background: #fff; padding: 16px; border-radius: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); margin-bottom: 16px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: #0d9488; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; }
        .user-details h3 { font-size: 16px; color: #1e293b; font-weight: 700; }
        .user-details .sub { font-size: 12px; color: #94a3b8; }
        .header-actions { display: flex; gap: 10px; }
        .btn-notification { background: #f1f5f9; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; color: #1e293b; cursor: pointer; position: relative; }
        .btn-notification .badge { position: absolute; top: -2px; right: -2px; background: #ef4444; color: #fff; font-size: 10px; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .btn-logout { background: transparent; border: none; font-size: 20px; color: #94a3b8; cursor: pointer; }

        /* الإحصائيات */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
        .stat-card { background: #fff; padding: 14px 8px; border-radius: 16px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
        .stat-card .num { font-size: 22px; font-weight: 800; color: #0d9488; }
        .stat-card .label { font-size: 11px; color: #94a3b8; }

        /* زر مركز الخدمات (النجمة) */
        .services-hub-btn { display: block; background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%); color: #fff; padding: 16px; border-radius: 16px; text-decoration: none; text-align: center; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(13,148,136,0.25); transition: 0.3s; }
        .services-hub-btn:active { transform: scale(0.98); }
        .services-hub-btn i { font-size: 24px; display: block; margin-bottom: 4px; }
        .services-hub-btn span { font-size: 18px; font-weight: 700; }
        .services-hub-btn small { font-size: 13px; opacity: 0.85; display: block; margin-top: 2px; }

        /* وصلات سريعة (خدمات ربط) */
        .quick-links { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
        .quick-link { background: #fff; padding: 14px 6px; border-radius: 16px; text-align: center; text-decoration: none; color: #1e293b; box-shadow: 0 1px 4px rgba(0,0,0,0.04); transition: 0.2s; }
        .quick-link:active { transform: scale(0.95); background: #f8fafc; }
        .quick-link i { font-size: 24px; color: #0d9488; display: block; margin-bottom: 4px; }
        .quick-link span { font-size: 11px; font-weight: 600; }

        /* خروج */
        .logout-btn { width: 100%; padding: 12px; background: #fef2f2; color: #dc2626; border: none; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer; border: 1px solid #fecaca; }
        .logout-btn:active { transform: scale(0.98); }

        @media (max-width: 480px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .quick-links { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

<div class="app-container">
    <!-- الهيدر -->
    <header class="patient-header">
        <div class="header-top">
            <div class="user-info">
                <div class="avatar" id="userAvatar">م</div>
                <div class="user-details">
                    <h3 id="userName">مرحباً، محمد</h3>
                    <span class="sub" id="userId"><i class="fas fa-id-card"></i> #DR-1001</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn-notification" onclick="alert('📬 ليس لديك إشعارات جديدة')">
                    <i class="fas fa-bell"></i>
                    <span class="badge">0</span>
                </button>
                <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </header>

    <!-- إحصائيات سريعة -->
    <div class="stats-grid">
        <div class="stat-card"><div class="num">3</div><div class="label">روشتات</div></div>
        <div class="stat-card"><div class="num">8</div><div class="label">نقاط الولاء</div></div>
        <div class="stat-card"><div class="num">2</div><div class="label">مواعيد</div></div>
        <div class="stat-card"><div class="num">42</div><div class="label">أيام متابعة</div></div>
    </div>

    <!-- ===== زر مركز الخدمات (الخدمة الأهم) ===== -->
    <a href="services-hub.html" class="services-hub-btn">
        <i class="fas fa-th-large"></i>
        <span>🌟 مركز الخدمات</span>
        <small>32 خدمة (ذاتية + ربط)</small>
    </a>

    <!-- وصلات سريعة لأهم خدمات الربط -->
    <div class="quick-links">
        <a href="services/network.html" class="quick-link">
            <i class="fas fa-link"></i>
            <span>شبكتي</span>
        </a>
        <a href="services/store.html" class="quick-link">
            <i class="fas fa-store"></i>
            <span>المتجر</span>
        </a>
        <a href="services/wallet.html" class="quick-link">
            <i class="fas fa-wallet"></i>
            <span>المحفظة</span>
        </a>
        <a href="services/appointment.html" class="quick-link">
            <i class="fas fa-calendar-check"></i>
            <span>حجز موعد</span>
        </a>
        <a href="services/chat-bot.html" class="quick-link">
            <i class="fas fa-comment-medical"></i>
            <span>المساعد</span>
        </a>
        <a href="services/ai-report.html" class="quick-link">
            <i class="fas fa-robot"></i>
            <span>التقرير</span>
        </a>
    </div>

    <!-- زر خروج -->
    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>

    <p style="text-align:center;font-size:11px;color:#94a3b8;margin-top:20px;">Doctor.ai v3.0 — جميع الحقوق محفوظة</p>
</div>

<script>
// ============================================================
// ===== جافا سكريبت - لوحة المريض =====
// ============================================================

// ----- تحميل بيانات المستخدم -----
function loadUser() {
    // محاولة جلب البيانات من localStorage
    let user = JSON.parse(localStorage.getItem('currentUser') || '{}');
    if (!user.fullName) {
        // لو مش لاقي، نستخدم بيانات وهمية
        user = { fullName: 'محمد علي', id: 'DR-1001', avatar: 'م' };
    }
    document.getElementById('userName').textContent = 'مرحباً، ' + user.fullName;
    document.getElementById('userId').innerHTML = '<i class="fas fa-id-card"></i> ' + (user.id || 'DR-1001');
    document.getElementById('userAvatar').textContent = user.fullName.charAt(0) || 'م';

    // تحديث رقم الإشعارات
    const notifCount = JSON.parse(localStorage.getItem('notifications') || '[]').length;
    document.querySelector('.btn-notification .badge').textContent = notifCount > 0 ? notifCount : '0';
}

// ----- تسجيل الخروج -----
function logout() {
    if (confirm('هل أنت متأكد من الخروج من حسابك؟')) {
        localStorage.clear();
        sessionStorage.clear();
        window.location.href = '../../auth/login.html';
    }
}

// ----- تحميل الصفحة -----
document.addEventListener('DOMContentLoaded', function() {
    loadUser();
    console.log('✅ لوحة المريض (بوابة الخدمات) جاهزة!');
});
</script>

</body>
</html>
