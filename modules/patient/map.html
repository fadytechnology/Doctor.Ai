<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>الخريطة الذكية - Doctor.ai</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../../CSS/style.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f2f4f8; direction: rtl; padding: 16px; min-height: 100vh; }
        .app-container { max-width: 480px; margin: 0 auto; }
        .page-header { background: #fff; padding: 16px; border-radius: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
        .page-header .back-btn { background: #f1f5f9; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; color: #1e293b; cursor: pointer; }
        .page-header h1 { font-size: 20px; font-weight: 700; color: #1e293b; margin: 0; flex: 1; }
        .page-header h1 i { color: var(--gateway-commerce); }
        .search-box { display: flex; gap: 10px; margin-bottom: 12px; }
        .search-box input { flex: 1; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; font-family: inherit; font-size: 14px; }
        .search-box button { background: var(--gateway-commerce); color: #fff; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: 600; }
        #map { height: 360px; border-radius: 16px; margin-bottom: 12px; background: #e2e8f0; }
        .pharmacy-list { background: #fff; border-radius: 16px; padding: 12px; max-height: 200px; overflow-y: auto; }
        .pharmacy-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
        .pharmacy-item:last-child { border-bottom: none; }
        .pharmacy-item .name { font-weight: 600; }
        .pharmacy-item .distance { font-size: 12px; color: #0d9488; }
        .pharmacy-item .price { font-size: 12px; color: #64748b; }
        .bottom-nav { display: flex; justify-content: space-around; align-items: center; background: #fff; padding: 10px 0; border-radius: 30px; box-shadow: 0 -2px 12px rgba(0,0,0,0.04); margin-top: 16px; }
        .bottom-nav a { color: #94a3b8; font-size: 22px; text-decoration: none; padding: 8px 16px; border-radius: 30px; transition: 0.2s; }
        .bottom-nav a.active { color: var(--gateway-commerce); background: rgba(13,148,136,0.1); }
        .loading { text-align: center; padding: 20px; color: #94a3b8; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="page-header">
        <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-right"></i></button>
        <h1><i class="fas fa-map-marked-alt"></i> الخريطة الذكية</h1>
    </div>

    <div class="search-box">
        <input type="text" id="drugSearch" placeholder="ابحث عن دواء..." />
        <button onclick="searchNearby()"><i class="fas fa-search"></i></button>
    </div>

    <div id="map"></div>

    <div class="pharmacy-list" id="pharmacyList">
        <div class="loading">🔍 ابحث عن دواء لعرض الصيدليات القريبة</div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html"><i class="fas fa-home"></i></a>
        <a href="#" class="active"><i class="fas fa-map"></i></a>
        <a href="settings.html"><i class="fas fa-cog"></i></a>
        <a href="gateway-details.html?gateway=communication"><i class="fas fa-share-alt"></i></a>
    </nav>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const API_BASE = 'http://localhost:5000/api';
    let map = null;
    let markers = [];
    let userLat = 30.0444; // افتراضي القاهرة
    let userLng = 31.2357;

    function getToken() { return localStorage.getItem('token'); }

    // الحصول على موقع المستخدم
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (pos) => { userLat = pos.coords.latitude; userLng = pos.coords.longitude; initMap(); },
            () => { initMap(); }
        );
    } else { initMap(); }

    function initMap() {
        map = L.map('map').setView([userLat, userLng], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        // إضافة علامة موقع المستخدم
        L.marker([userLat, userLng], { icon: L.divIcon({ className: 'user-marker', html: '📍', iconSize: [24, 24] }) })
            .addTo(map)
            .bindPopup('📍 أنت هنا');
    }

    
    async function searchNearby() {
        const drug = document.getElementById('drugSearch').value.trim();
        if (!drug) { alert('يرجى إدخال اسم الدواء'); return; }

        const token = getToken();
        if (!token) { window.location.href = '../../auth/login.html'; return; }

        const list = document.getElementById('pharmacyList');
        list.innerHTML = '<div class="loading">⏳ جاري البحث...</div>';

        try {
            const res = await fetch(`${API_BASE}/inventory/nearby?lat=${userLat}&lng=${userLng}&drug=${encodeURIComponent(drug)}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();

            if (!data.success || data.results.length === 0) {
                list.innerHTML = '<div class="empty">😔 لا توجد صيدليات قريبة بها هذا الدواء</div>';
                return;
            }

            list.innerHTML = '';
            data.results.forEach(item => {
                const div = document.createElement('div');
                div.className = 'pharmacy-item';
                div.innerHTML = `
                    <div>
                        <div class="name">${item.pharmacy_name}</div>
                        <div class="distance">📏 ${item.distance_km.toFixed(1)} كم</div>
                    </div>
                    <div style="text-align:left;">
                        <div class="price">💰 ${item.price} ج.م</div>
                        <div style="font-size:11px;color:#64748b;">📦 ${item.quantity_in_stock} متبقي</div>
                    </div>
                `;
                list.appendChild(div);
            });

            // تحديث الخريطة (إذا كانت Leaflet محملة)
            if (typeof L !== 'undefined' && map) {
                markers.forEach(m => map.removeLayer(m));
                markers = [];
                data.results.forEach(item => {
                    const marker = L.marker([item.latitude, item.longitude])
                        .addTo(map)
                        .bindPopup(`
                            <b>${item.pharmacy_name}</b><br>
                            💊 ${item.drug_name}<br>
                            💰 ${item.price} ج.م<br>
                            📦 ${item.quantity_in_stock} متبقي<br>
                            📏 ${item.distance_km.toFixed(1)} كم
                        `);
                    markers.push(marker);
                });
                const group = L.featureGroup(markers);
                map.fitBounds(group.getBounds(), { padding: [50, 50] });
            }

        } catch (err) {
            console.error(err);
            list.innerHTML = '<div class="error">❌ حدث خطأ في البحث</div>';
        }
    }
    

        const token = getToken();
        if (!token) { window.location.href = '../../auth/login.html'; return; }

        const list = document.getElementById('pharmacyList');
        list.innerHTML = '<div class="loading">⏳ جاري البحث...</div>';

        try {
            const res = await fetch(`${API_BASE}/inventory/nearby?lat=${userLat}&lng=${userLng}&drug=${encodeURIComponent(drug)}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();

            if (!data.success || data.results.length === 0) {
                list.innerHTML = '<div class="loading">😔 لا توجد صيدليات قريبة بها هذا الدواء</div>';
                return;
            }

            // عرض القائمة
            list.innerHTML = '';
            data.results.forEach(item => {
                const div = document.createElement('div');
                div.className = 'pharmacy-item';
                div.innerHTML = `
                    <div>
                        <div class="name">${item.pharmacy_name}</div>
                        <div class="distance">📏 ${item.distance_km.toFixed(1)} كم</div>
                    </div>
                    <div style="text-align:left;">
                        <div class="price">💰 ${item.price} ج.م</div>
                        <div style="font-size:11px;color:#64748b;">📦 ${item.quantity_in_stock} متبقي</div>
                    </div>
                `;
                list.appendChild(div);
            });

            // تحديث الخريطة
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            data.results.forEach(item => {
                const marker = L.marker([item.latitude, item.longitude])
                    .addTo(map)
                    .bindPopup(`
                        <b>${item.pharmacy_name}</b><br>
                        💊 ${item.drug_name}<br>
                        💰 ${item.price} ج.م<br>
                        📦 ${item.quantity_in_stock} متبقي<br>
                        📏 ${item.distance_km.toFixed(1)} كم
                    `);
                markers.push(marker);
            });

            // تقريب الخريطة لعرض جميع العلامات
            if (data.results.length > 0) {
                const group = L.featureGroup(markers);
                map.fitBounds(group.getBounds(), { padding: [50, 50] });
            }

        } catch (err) {
            console.error(err);
            list.innerHTML = '<div class="loading">❌ حدث خطأ في البحث</div>';
        }
    }

    document.getElementById('drugSearch').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchNearby();
    });
</script>
</body>
</html>
