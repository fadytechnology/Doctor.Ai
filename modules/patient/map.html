<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>الخريطة - Doctor.ai</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../../CSS/style.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f2f4f8; direction: rtl; padding: 16px; min-height: 100vh; }
        .app-container { max-width: 480px; margin: 0 auto; }
        
        .page-header { background: #fff; padding: 16px; border-radius: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
        .page-header .back-btn { background: #f1f5f9; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; color: #1e293b; cursor: pointer; }
        .page-header h1 { font-size: 20px; font-weight: 700; color: #1e293b; margin: 0; flex: 1; }
        
        .map-placeholder { background: #e2e8f0; border-radius: 20px; height: 400px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 16px; color: #64748b; }
        .map-placeholder i { font-size: 64px; color: #94a3b8; margin-bottom: 16px; }
        .map-placeholder h3 { font-size: 18px; margin: 0; }
        .map-placeholder p { font-size: 14px; margin: 4px 0 0; }
        
        .location-list { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
        .location-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
        .location-item:last-child { border-bottom: none; }
        .location-item i { font-size: 20px; color: #0d9488; width: 32px; text-align: center; }
        .location-item .info { flex: 1; }
        .location-item .info h4 { font-size: 14px; font-weight: 600; color: #1e293b; margin: 0; }
        .location-item .info p { font-size: 12px; color: #94a3b8; margin: 0; }
        
        .bottom-nav { display: flex; justify-content: space-around; align-items: center; background: #fff; padding: 10px 0; border-radius: 30px; box-shadow: 0 -2px 12px rgba(0,0,0,0.04); margin-top: 8px; }
        .bottom-nav a { color: #94a3b8; font-size: 22px; text-decoration: none; padding: 8px 16px; border-radius: 30px; transition: 0.2s; }
        .bottom-nav a.active { color: #0d9488; background: #e6f7f5; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="page-header">
        <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-right"></i></button>
        <h1><i class="fas fa-map" style="color:#0d9488;"></i> الخريطة الطبية</h1>
    </div>

    <div class="map-placeholder">
        <i class="fas fa-map-marked-alt"></i>
        <h3>🗺️ الخريطة قيد التطوير</h3>
        <p>ستظهر هنا أقرب العيادات والصيدليات والمختبرات</p>
        <button onclick="alert('🚀 قريباً: سيتم تفعيل الخريطة')" style="margin-top:16px;background:#0d9488;border:none;color:#fff;padding:10px 24px;border-radius:30px;font-weight:600;cursor:pointer;">🔜 قريباً</button>
    </div>

    <div class="location-list">
        <div class="location-item">
            <i class="fas fa-store"></i>
            <div class="info"><h4>صيدلية النيل</h4><p>شارع الثورة، القاهرة - 2.3 كم</p></div>
            <i class="fas fa-chevron-left" style="color:#94a3b8;"></i>
        </div>
        <div class="location-item">
            <i class="fas fa-flask"></i>
            <div class="info"><h4>مختبر الماس</h4><p>شارع الجمهورية، الجيزة - 4.1 كم</p></div>
            <i class="fas fa-chevron-left" style="color:#94a3b8;"></i>
        </div>
        <div class="location-item">
            <i class="fas fa-user-md"></i>
            <div class="info"><h4>عيادة الدكتور أحمد</h4><p>شارع النيل، القاهرة - 1.8 كم</p></div>
            <i class="fas fa-chevron-left" style="color:#94a3b8;"></i>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html"><i class="fas fa-home"></i></a>
        <a href="map.html" class="active"><i class="fas fa-map"></i></a>
        <a href="settings.html"><i class="fas fa-cog"></i></a>
        <a href="gateway-details.html?gateway=communication"><i class="fas fa-share-alt"></i></a>
    </nav>
</div>

</body>
</html>
