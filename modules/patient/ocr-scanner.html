<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>قارئ الروشتات - Doctor.ai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../../CSS/style.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Cairo',sans-serif; background:#f2f4f8; direction:rtl; padding:16px; min-height:100vh; }
        .app-container { max-width:480px; margin:0 auto; background:#fff; border-radius:28px; padding:20px; box-shadow:0 8px 40px rgba(0,0,0,0.06); }
        .header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
        .header .back { background:none; border:none; font-size:20px; color:#0d9488; cursor:pointer; }
        .header .title { font-size:20px; font-weight:700; color:#1e293b; flex:1; }
        .upload-box { border:2px dashed #d1f5db; border-radius:16px; padding:30px; text-align:center; cursor:pointer; background:#f8fafc; transition:0.3s; }
        .upload-box:hover { background:#ecfdf5; border-color:#0d9488; }
        .upload-box i { font-size:48px; color:#0d9488; }
        .upload-box p { color:#64748b; margin-top:8px; }
        #imagePreview { max-width:100%; max-height:200px; border-radius:12px; margin-top:12px; display:none; }
        .result-box { background:#f1f5f9; border-radius:12px; padding:16px; margin-top:16px; }
        .result-box .drug-item { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #e5e7eb; }
        .result-box .drug-item:last-child { border-bottom:none; }
        .btn-ocr { width:100%; padding:12px; background:#0d9488; color:#fff; border:none; border-radius:12px; font-size:16px; font-weight:600; cursor:pointer; margin-top:12px; }
        .manual-input { margin-top:12px; }
        .manual-input input { width:100%; padding:10px; border:2px solid #e5e7eb; border-radius:12px; font-size:14px; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <button class="back" onclick="window.history.back()"><i class="fas fa-arrow-right"></i></button>
        <div class="title">📷 قارئ الروشتات</div>
    </div>
    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <i class="fas fa-cloud-upload-alt"></i>
        <p>اضغط لتحميل صورة الروشتة</p>
        <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleImage(event)" />
        <img id="imagePreview" />
    </div>
    <div class="manual-input">
        <input type="text" id="manualText" placeholder="أو اكتب نص الروشتة يدوياً..." />
        <button class="btn-ocr" onclick="scanManual()"><i class="fas fa-search"></i> فحص النص</button>
    </div>
    <div id="resultContainer" style="margin-top:12px;"></div>
</div>
<script>
// قاعدة بيانات أدوية وهمية
const drugDB = ['باراسيتامول', 'أموكسيسيلين', 'فيتامين C', 'ميتفورمين', 'أملوديبين', 'أسبرين', 'إيبوبروفين', 'لوراتادين', 'أوميبرازول', 'سيتالوبرام'];
function extractDrugs(text) {
    const found = [];
    drugDB.forEach(d => { if (text.includes(d)) found.push(d); });
    return found;
}
function displayResults(drugs) {
    const container = document.getElementById('resultContainer');
    if (drugs.length === 0) {
        container.innerHTML = `<div class="result-box"><p style="color:#94a3b8;">❌ لم يتم العثور على أدوية في النص. تأكد من وضوح الصورة أو النص.</p></div>`;
        return;
    }
    let html = `<div class="result-box"><h4 style="color:#0d9488;">✅ الأدوية المكتشفة (${drugs.length})</h4>`;
    drugs.forEach(d => {
        html += `<div class="drug-item"><span>💊 ${d}</span><span style="color:#0d9488;">متوفر</span></div>`;
    });
    html += `<div style="margin-top:10px;font-size:12px;color:#64748b;">🔍 هذه الأدوية متاحة في صيدليتك المرتبطة.</div>`;
    html += `</div>`;
    container.innerHTML = html;
}
function handleImage(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
        const img = document.getElementById('imagePreview');
        img.src = ev.target.result;
        img.style.display = 'block';
        // محاكاة OCR بسيطة: نفترض أن النص المستخرج هو ما كتبه المستخدم يدوياً
        // للواقع: هنستخدم Tesseract.js، لكن للتجربة هنعمل محاكاة
        alert('📸 تم تحميل الصورة. قم بكتابة النص الظاهر في الحقل أدناه للفحص (أو استخدم الـ OCR الحقيقي لاحقاً).');
    };
    reader.readAsDataURL(file);
}
function scanManual() {
    const text = document.getElementById('manualText').value.trim();
    if (!text) { alert('❌ يرجى كتابة نص الروشتة'); return; }
    const drugs = extractDrugs(text);
    displayResults(drugs);
}
document.addEventListener('DOMContentLoaded', () => {
    console.log('✅ قارئ الروشتات جاهز (محاكاة)');
});
</script>
</body>
</html>
