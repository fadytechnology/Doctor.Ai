<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>لوحة المختبر - Doctor.ai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../CSS/style.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f2f4f8; direction: rtl; padding: 16px; padding-bottom: 80px; min-height: 100vh; }
        .app-container { max-width: 480px; margin: 0 auto; }
        .lab-header { background: #fff; padding: 16px; border-radius: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); margin-bottom: 16px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--gateway-lab); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; }
        .user-details h3 { font-size: 16px; color: #1e293b; font-weight: 700; }
        .user-details .sub { font-size: 12px; color: #94a3b8; }
        .header-actions { display: flex; gap: 10px; }
        .btn-notification { background: #f1f5f9; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; color: #1e293b; cursor: pointer; position: relative; }
        .btn-notification .badge { position: absolute; top: -2px; right: -2px; background: #ef4444; color: #fff; font-size: 10px; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .btn-logout { background: transparent; border: none; font-size: 20px; color: #94a3b8; cursor: pointer; padding: 8px; border-radius: 50%; transition: 0.2s; }
        .btn-logout:active { background: #f1f5f9; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
        .stat-card { background: #fff; padding: 14px 8px; border-radius: 16px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
        .stat-card .num { font-size: 22px; font-weight: 800; color: var(--gateway-lab); }
        .stat-card .label { font-size: 11px; color: #94a3b8; }
        .services-hub-btn { display: block; background: linear-gradient(135deg, var(--gateway-lab) 0%, #047857 100%); color: #fff; padding: 16px; border-radius: 16px; text-decoration: none; text-align: center; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(5,150,105,0.25); transition: 0.3s; }
        .services-hub-btn:active { transform: scale(0.98); }
        .services-hub-btn i { font-size: 24px; display: block; margin-bottom: 4px; }
        .services-hub-btn span { font-size: 18px; font-weight: 700; }
        .services-hub-btn small { font-size: 13px; opacity: 0.85; display: block; margin-top: 2px; }
        .orders-section { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); margin-bottom: 16px; }
        .orders-section .title { font-size: 15px; font-weight: 700; color: #1e293b; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .orders-section .title i { color: var(--gateway-lab); }
        .order-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f3f4f6; }
        .order-item:last-child { border-bottom: none; }
        .order-info .patient { font-weight: 600; color: #1e293b; font-size: 14px; }
        .order-info .test { font-size: 12px; color: #64748b; display: block; }
        .order-status { font-size: 11px; padding: 2px 12px; border-radius: 12px; font-weight: 600; }
        .order-status.pending { background: #fef3c7; color: #92400e; }
        .order-status.completed { background: #d1fae5; color: #065f46; }
        .quick-services { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
        .quick-service { background: #fff; padding: 10px 4px; border-radius: 12px; text-align: center; text-decoration: none; color: #1e293b; box-shadow: 0 1px 4px rgba(0,0,0,0.04); transition: 0.2s; border: 1px solid transparent; }
        .quick-service:active { transform: scale(0.95); background: #f8fafc; border-color: var(--gateway-lab); }
        .quick-service i { font-size: 20px; color: var(--gateway-lab); display: block; margin-bottom: 2px; }
        .quick-service span { font-size: 10px; font-weight: 600; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; display: flex; justify-content: space-around; align-items: center; padding: 6px 0 10px; box-shadow: 0 -4px 20px rgba(0,0,0,0.04); z-index: 100; border-top: 1px solid #f1f5f9; max-width: 480px; margin: 0 auto; }
        .nav-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; color: #94a3b8; transition: 0.3s; padding: 4px 12px; border: none; background: transparent; font-family: inherit; }
        .nav-item i { font-size: 20px; }
        .nav-item span { font-size: 10px; margin-top: 2px; }
        .nav-item.active { color: var(--gateway-lab); }
        .nav-item.active i { transform: scale(1.1); }
        .nav-item:active { transform: scale(0.92); }
        @media (max-width: 480px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .quick-services { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="lab-header">
            <div class="header-top">
                <div class="user-info">
                    <div class="avatar" id="userAvatar">م</div>
                    <div class="user-details">
                        <h3 id="userName">مختبر <span style="color:var(--gateway-lab);">الشفاء</span></h3>
                        <span class="sub" id="userId"><i class="fas fa-id-card"></i> #LAB-2024</span>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="btn-notification" onclick="alert('📬 لديك 4 إشعارات جديدة')">
                        <i class="fas fa-bell"></i><span class="badge">4</span>
                    </button>
                    <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </header>
        <div class="stats-grid">
            <div class="stat-card"><div class="num">14</div><div class="label">طلبات اليوم</div></div>
            <div class="stat-card"><div class="num">6</div><div class="label">قيد التنفيذ</div></div>
            <div class="stat-card"><div class="num">8</div><div class="label">منتهية</div></div>
            <div class="stat-card"><div class="num">32</div><div class="label">عملاء</div></div>
        </div>
        <a href="lab-services-app.html" class="services-hub-btn">
            <i class="fas fa-th-large"></i>
            <span>🧪 البوابات الذكية</span>
            <small>4 أقسام (خدمات المختبر)</small>
        </a>
        <div class="quick-services">
            <a href="services/lab-orders.html" class="quick-service"><i class="fas fa-flask"></i><span>الطلبات</span></a>
            <a href="services/lab-results.html" class="quick-service"><i class="fas fa-file-medical"></i><span>النتائج</span></a>
            <a href="services/lab-inventory.html" class="quick-service"><i class="fas fa-boxes"></i><span>المخزون</span></a>
            <a href="services/lab-reports.html" class="quick-service"><i class="fas fa-chart-bar"></i><span>التقارير</span></a>
        </div>
        <div class="orders-section">
            <div class="title"><i class="fas fa-flask"></i> آخر الطلبات</div>
            <div id="recentOrders">
                <div class="order-item"><div class="order-info"><span class="patient">أحمد سامي</span><span class="test">تحليل دم شامل</span></div><span class="order-status pending">قيد التنفيذ</span></div>
                <div class="order-item"><div class="order-info"><span class="patient">سارة علي</span><span class="test">وظائف كبد</span></div><span class="order-status completed">منتهي</span></div>
                <div class="order-item"><div class="order-info"><span class="patient">خالد محمود</span><span class="test">تحليل بول</span></div><span class="order-status pending">قيد التنفيذ</span></div>
            </div>
        </div>
        <nav class="bottom-nav">
            <div class="nav-item active" onclick="navigateTo('home')"><i class="fas fa-home"></i><span>الرئيسية</span></div>
            <div class="nav-item" onclick="navigateTo('orders')"><i class="fas fa-flask"></i><span>الطلبات</span></div>
            <div class="nav-item" onclick="navigateTo('results')"><i class="fas fa-file-medical"></i><span>النتائج</span></div>
            <div class="nav-item" onclick="navigateTo('inventory')"><i class="fas fa-boxes"></i><span>المخزون</span></div>
            <div class="nav-item" onclick="navigateTo('more')"><i class="fas fa-th-large"></i><span>البوابات</span></div>
        </nav>
    </div>
    <script>
        function loadLabData() {
            let user = JSON.parse(localStorage.getItem('currentUser') || '{}');
            if (!user.fullName) { user = { fullName: 'مختبر الشفاء', id: 'LAB-2024', avatar: 'م' }; }
            document.getElementById('userName').innerHTML = 'مختبر <span style="color:var(--gateway-lab);">' + user.fullName.replace('مختبر ', '') + '</span>';
            document.getElementById('userId').innerHTML = '<i class="fas fa-id-card"></i> ' + (user.id || 'LAB-2024');
            document.getElementById('userAvatar').textContent = user.fullName.charAt(0) || 'م';
        }
        function logout() { if (confirm('هل أنت متأكد من الخروج؟')) { localStorage.clear(); sessionStorage.clear(); window.location.href = '../../auth/login.html'; } }
        function navigateTo(page) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            const pages = ['home', 'orders', 'results', 'inventory', 'more'];
            const index = pages.indexOf(page); if (index !== -1) document.querySelectorAll('.nav-item')[index].classList.add('active');
            const map = { 'home': 'index.html', 'orders': 'services/lab-orders.html', 'results': 'services/lab-results.html', 'inventory': 'services/lab-inventory.html', 'more': 'lab-services-app.html' };
            if (map[page]) window.location.href = map[page];
        }
        document.addEventListener('DOMContentLoaded', function() { loadLabData(); console.log('✅ لوحة المختبر جاهزة!'); });
    </script>
</body>
</html>
