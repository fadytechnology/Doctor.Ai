<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>تنبيهات المخزون - الصيدلي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../../CSS/style.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Cairo',sans-serif; background:#f2f4f8; direction:rtl; padding:16px; padding-bottom:80px; min-height:100vh; }
        .app-container { max-width:480px; margin:0 auto; background:#fff; border-radius:28px; padding:20px; box-shadow:0 8px 40px rgba(0,0,0,0.06); }
        .header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
        .header .back { background:none; border:none; font-size:20px; color:#0d9488; cursor:pointer; }
        .header .title { font-size:20px; font-weight:700; color:#1e293b; flex:1; }
        .alert-item { display:flex; justify-content:space-between; padding:12px; border-radius:12px; margin-bottom:8px; }
        .alert-item.danger { background:#fef2f2; border-right:4px solid #dc2626; }
        .alert-item.warning { background:#fffbeb; border-right:4px solid #d97706; }
        .alert-item .name { font-weight:700; }
        .alert-item .msg { font-size:13px; color:#64748b; }
        .empty-state { text-align:center; padding:30px 0; color:#94a3b8; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <button class="back" onclick="window.history.back()"><i class="fas fa-arrow-right"></i></button>
        <div class="title">🔔 تنبيهات المخزون</div>
    </div>
    <div id="alertsList"></div>
</div>
<script>
let products = JSON.parse(localStorage.getItem('pharmacyInventory') || '[]');
function renderAlerts() {
    const container = document.getElementById('alertsList');
    const alerts = products.filter(p => p.stock < 20 || (p.expiry && new Date(p.expiry) < new Date(Date.now() + 30*86400000)));
    if (alerts.length === 0) { container.innerHTML = '<div class="empty-state"><i class="fas fa-check-circle" style="color:#065f46;"></i> لا توجد تنبيهات</div>'; return; }
    container.innerHTML = '';
    alerts.forEach(p => {
        const isLow = p.stock < 20;
        const isExpiring = p.expiry && new Date(p.expiry) < new Date(Date.now() + 30*86400000);
        const div = document.createElement('div');
        div.className = `alert-item ${isLow && p.stock === 0 ? 'danger' : 'warning'}`;
        let msg = isLow ? `الكمية: ${p.stock} (قاربت على النفاد)` : '';
        if (isExpiring) msg += (msg ? ' | ' : '') + `صلاحية: ${p.expiry} (تقترب)`;
        div.innerHTML = `<div><div class="name">${p.name}</div><div class="msg">${msg}</div></div>`;
        container.appendChild(div);
    });
}
document.addEventListener('DOMContentLoaded', renderAlerts);
</script>
</body>
</html>
