<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>إدارة العملاء - الصيدلي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../../CSS/style.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Cairo',sans-serif; background:#f2f4f8; direction:rtl; padding:16px; padding-bottom:80px; min-height:100vh; }
        .app-container { max-width:480px; margin:0 auto; background:#fff; border-radius:28px; padding:20px; box-shadow:0 8px 40px rgba(0,0,0,0.06); }
        .header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
        .header .back { background:none; border:none; font-size:20px; color:#0d9488; cursor:pointer; }
        .header .title { font-size:20px; font-weight:700; color:#1e293b; flex:1; }
        .customer-item { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #f1f5f9; }
        .customer-item .info .name { font-weight:700; }
        .customer-item .info .detail { font-size:12px; color:#64748b; }
        .customer-item .points { font-weight:700; color:#0d9488; }
        .search-box { width:100%; padding:10px; border:2px solid #e5e7eb; border-radius:12px; margin-bottom:12px; }
        .empty-state { text-align:center; padding:30px 0; color:#94a3b8; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <button class="back" onclick="window.history.back()"><i class="fas fa-arrow-right"></i></button>
        <div class="title">👥 إدارة العملاء</div>
    </div>
    <input class="search-box" type="text" placeholder="🔍 بحث..." oninput="filterCustomers(this.value)" />
    <div id="customersList"></div>
</div>
<script>
let customers = JSON.parse(localStorage.getItem('pharmacyCustomers') || '[{"name":"محمد علي","points":120,"phone":"01001234567"},{"name":"سارة حسن","points":45,"phone":"01008765432"},{"name":"خالد محمود","points":80,"phone":"01005556677"}]');
function renderCustomers(filter='') {
    const container = document.getElementById('customersList');
    const filtered = customers.filter(c => c.name.includes(filter));
    if (filtered.length === 0) { container.innerHTML = '<div class="empty-state"><i class="fas fa-users"></i> لا يوجد عملاء</div>'; return; }
    container.innerHTML = '';
    filtered.forEach(c => {
        const div = document.createElement('div');
        div.className = 'customer-item';
        div.innerHTML = `<div class="info"><div class="name">${c.name}</div><div class="detail">📱 ${c.phone || 'غير مدخل'}</div></div><span class="points">${c.points || 0} نقطة</span>`;
        container.appendChild(div);
    });
}
function filterCustomers(v) { renderCustomers(v); }
document.addEventListener('DOMContentLoaded', () => renderCustomers());
</script>
</body>
</html>
