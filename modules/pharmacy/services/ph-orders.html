<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>إدارة الطلبات - الصيدلي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../../CSS/style.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Cairo',sans-serif; background:#f2f4f8; direction:rtl; padding:16px; min-height:100vh; }
        .app-container { max-width:480px; margin:0 auto; background:#fff; border-radius:28px; padding:20px; box-shadow:0 8px 40px rgba(0,0,0,0.06); }
        .header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
        .header .back { background:none; border:none; font-size:20px; color:#0d9488; cursor:pointer; }
        .header .title { font-size:20px; font-weight:700; color:#1e293b; flex:1; }
        .filter-bar { display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
        .filter-bar button { padding:4px 14px; border:2px solid #e5e7eb; border-radius:20px; background:#fff; font-size:12px; cursor:pointer; transition:0.2s; }
        .filter-bar button.active { background:#0d9488; color:#fff; border-color:#0d9488; }
        .order-item { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #f1f5f9; }
        .order-item .info .patient { font-weight:700; font-size:15px; }
        .order-item .info .meds { font-size:12px; color:#64748b; }
        .order-item .info .time { font-size:11px; color:#94a3b8; }
        .order-status { font-size:12px; padding:2px 12px; border-radius:12px; font-weight:600; }
        .order-status.pending { background:#fef3c7; color:#92400e; }
        .order-status.processing { background:#dbeafe; color:#1e40af; }
        .order-status.ready { background:#d1fae5; color:#065f46; }
        .order-status.delivered { background:#d1fae5; color:#065f46; }
        .order-status.cancelled { background:#fecaca; color:#991b1b; }
        .order-actions { display:flex; gap:6px; margin-top:4px; flex-wrap:wrap; }
        .btn-sm { padding:2px 10px; border:none; border-radius:12px; font-size:11px; cursor:pointer; transition:0.2s; }
        .btn-sm:active { transform:scale(0.95); }
        .btn-update { background:#0d9488; color:#fff; }
        .btn-update:hover { background:#0f766e; }
        .empty-state { text-align:center; padding:30px 0; color:#94a3b8; }
        .empty-state i { font-size:40px; display:block; margin-bottom:8px; color:#cbd5e1; }
        .loading { text-align:center; padding:20px; color:#0d9488; }
        .badge-count { background:#0d9488; color:#fff; font-size:11px; padding:0 8px; border-radius:10px; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <button class="back" onclick="window.location.href='../services-hub.html'"><i class="fas fa-arrow-right"></i></button>
        <div class="title">📋 إدارة الطلبات <span class="badge-count" id="orderCount">0</span></div>
    </div>

    <div class="filter-bar">
        <button class="active" onclick="filterOrders('all')">الكل</button>
        <button onclick="filterOrders('pending')">⏳ قيد التجهيز</button>
        <button onclick="filterOrders('processing')">🔄 قيد المعالجة</button>
        <button onclick="filterOrders('ready')">✅ جاهز</button>
        <button onclick="filterOrders('delivered')">📦 تم التوصيل</button>
    </div>

    <div id="ordersList">
        <div class="loading"><i class="fas fa-spinner fa-pulse"></i> جاري تحميل الطلبات...</div>
    </div>
</div>

<script src="../../../JS/api.js"></script>
<script>
// ============================================================
// ===== إدارة الطلبات - الصيدلي =====
// ============================================================

let allOrders = [];
let currentFilter = 'all';

// ----- جلب الطلبات من السيرفر -----
async function loadOrders() {
    const container = document.getElementById('ordersList');
    container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> جاري تحميل الطلبات...</div>';

    try {
        const result = await apiGetPharmacyOrders();
        if (result.success && result.data) {
            allOrders = result.data;
        } else {
            console.error('❌ خطأ في جلب الطلبات:', result.message);
            allOrders = [];
        }
    } catch (error) {
        console.error('❌ خطأ:', error);
        allOrders = [];
    }

    // تحديث العدد
    document.getElementById('orderCount').textContent = allOrders.length;
    renderOrders(currentFilter);
}

// ----- عرض الطلبات -----
function renderOrders(filter) {
    const container = document.getElementById('ordersList');
    const filtered = filter === 'all' ? allOrders : allOrders.filter(o => o.status === filter);

    if (filtered.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-inbox"></i>
                لا توجد طلبات ${filter !== 'all' ? 'بهذه الحالة' : ''}
            </div>
        `;
        return;
    }

    container.innerHTML = '';
    filtered.forEach((o) => {
        const div = document.createElement('div');
        div.className = 'order-item';

        const statusMap = {
            pending: '⏳ قيد التجهيز',
            processing: '🔄 قيد المعالجة',
            ready: '✅ جاهز',
            delivered: '📦 تم التوصيل',
            cancelled: '❌ ملغي'
        };
        const statusClass = o.status || 'pending';

        // استخراج أسماء الأدوية من items
        let medsText = o.drug_name || 'طلب';
        if (o.items && o.items.length > 0) {
            medsText = o.items.map(i => i.drug_name || i.name).join('، ');
        }

        div.innerHTML = `
            <div class="info">
                <div class="patient">👤 ${o.patient_name || 'مريض'}</div>
                <div class="meds">💊 ${medsText}</div>
                <div class="time">🕒 ${new Date(o.created_at).toLocaleString('ar-EG')}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
                <span class="order-status ${statusClass}">${statusMap[statusClass] || statusClass}</span>
                <div class="order-actions">
                    ${o.status === 'pending' ? `<button class="btn-sm btn-update" onclick="updateStatus(${o.id},'processing')">تجهيز</button>` : ''}
                    ${o.status === 'processing' ? `<button class="btn-sm btn-update" onclick="updateStatus(${o.id},'ready')">جاهز</button>` : ''}
                    ${o.status === 'ready' ? `<button class="btn-sm btn-update" onclick="updateStatus(${o.id},'delivered')">توصيل</button>` : ''}
                    ${o.status === 'delivered' ? '<span style="font-size:12px;color:#94a3b8;">✅ مكتمل</span>' : ''}
                    ${o.status === 'cancelled' ? '<span style="font-size:12px;color:#94a3b8;">❌ ملغي</span>' : ''}
                </div>
            </div>
        `;
        container.appendChild(div);
    });
}

// ----- فلترة الطلبات -----
function filterOrders(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
    document.querySelector(`.filter-bar button[onclick*="${filter}"]`).classList.add('active');
    renderOrders(filter);
}

// ----- تحديث حالة الطلب -----
async function updateStatus(orderId, status) {
    if (!confirm(`هل أنت متأكد من تغيير الحالة إلى "${status}"؟`)) return;

    try {
        const result = await apiUpdateOrderStatus(orderId, status);
        if (result.success) {
            alert('✅ تم تحديث حالة الطلب');
            loadOrders(); // إعادة تحميل الطلبات
        } else {
            alert('❌ فشل التحديث: ' + (result.message || 'خطأ غير معروف'));
        }
    } catch (error) {
        alert('❌ حدث خطأ في الاتصال بالسيرفر');
        console.error(error);
    }
}

// ----- تحميل الصفحة -----
document.addEventListener('DOMContentLoaded', function() {
    loadOrders();
    console.log('✅ إدارة الطلبات (مربوطة بالسيرفر) جاهزة');
});
</script>
</body>
</html>
