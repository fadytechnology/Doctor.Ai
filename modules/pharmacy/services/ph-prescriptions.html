<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>الروشتات الرقمية - الصيدلي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../../CSS/style.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Cairo',sans-serif; background:#f2f4f8; direction:rtl; padding:16px; padding-bottom:80px; min-height:100vh; }
        .app-container { max-width:480px; margin:0 auto; background:#fff; border-radius:28px; padding:20px; box-shadow:0 8px 40px rgba(0,0,0,0.06); }
        .header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
        .header .back { background:none; border:none; font-size:20px; color:#0d9488; cursor:pointer; }
        .header .title { font-size:20px; font-weight:700; color:#1e293b; flex:1; }
        .rx-item { display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #f1f5f9; }
        .rx-item .doctor { font-weight:700; }
        .rx-item .status { font-size:12px; padding:2px 12px; border-radius:12px; background:#fef3c7; color:#92400e; }
        .rx-item .status.done { background:#d1fae5; color:#065f46; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <button class="back" onclick="window.history.back()"><i class="fas fa-arrow-right"></i></button>
        <div class="title">📝 الروشتات الرقمية</div>
    </div>
    <div class="rx-item"><div><div class="doctor">د. خالد</div><div style="font-size:13px;color:#64748b;">محمد علي - باراسيتامول</div></div><span class="status">قيد المراجعة</span></div>
    <div class="rx-item"><div><div class="doctor">د. سارة</div><div style="font-size:13px;color:#64748b;">نورا أحمد - أموكسيسيلين</div></div><span class="status done">موافقة</span></div>
</div>
</body>
</html>
