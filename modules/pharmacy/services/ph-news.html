<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>نشر أخبار - الصيدلي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../../CSS/style.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Cairo',sans-serif; background:#f2f4f8; direction:rtl; padding:16px; padding-bottom:80px; min-height:100vh; }
        .app-container { max-width:480px; margin:0 auto; background:#fff; border-radius:28px; padding:20px; box-shadow:0 8px 40px rgba(0,0,0,0.06); }
        .header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
        .header .back { background:none; border:none; font-size:20px; color:#0d9488; cursor:pointer; }
        .header .title { font-size:20px; font-weight:700; color:#1e293b; flex:1; }
        .form-group { margin-bottom:12px; }
        .form-group input, .form-group textarea { width:100%; padding:10px; border:2px solid #e5e7eb; border-radius:12px; }
        .btn-save { width:100%; padding:12px; background:#0d9488; color:#fff; border:none; border-radius:14px; cursor:pointer; }
        .news-item { padding:10px 0; border-bottom:1px solid #f1f5f9; font-size:14px; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <button class="back" onclick="window.history.back()"><i class="fas fa-arrow-right"></i></button>
        <div class="title">📢 نشر أخبار وعروض</div>
    </div>
    <div class="form-group"><input type="text" id="newsTitle" placeholder="عنوان الخبر (مثال: عرض جديد)" /></div>
    <div class="form-group"><textarea id="newsBody" rows="3" placeholder="تفاصيل الخبر أو العرض..."></textarea></div>
    <button class="btn-save" onclick="publishNews()"><i class="fas fa-paper-plane"></i> نشر</button>
    <div id="newsList" style="margin-top:16px;"></div>
</div>
<script>
let news = JSON.parse(localStorage.getItem('pharmacyNews') || '[]');
function renderNews() {
    const container = document.getElementById('newsList');
    if (news.length === 0) { container.innerHTML = '<p style="color:#94a3b8;text-align:center;">لا توجد أخبار منشورة</p>'; return; }
    container.innerHTML = '';
    news.slice().reverse().forEach(n => {
        const div = document.createElement('div');
        div.className = 'news-item';
        div.innerHTML = `<div><strong>${n.title}</strong></div><div style="font-size:13px;color:#64748b;">${n.body}</div>`;
        container.appendChild(div);
    });
}
function publishNews() {
    const title = document.getElementById('newsTitle').value.trim();
    const body = document.getElementById('newsBody').value.trim();
    if (!title || !body) { alert('❌ أدخل عنوان وتفاصيل الخبر'); return; }
    news.push({ title, body, date: new Date().toISOString() });
    localStorage.setItem('pharmacyNews', JSON.stringify(news));
    document.getElementById('newsTitle').value = ''; document.getElementById('newsBody').value = '';
    renderNews();
    alert('✅ تم نشر الخبر');
}
document.addEventListener('DOMContentLoaded', renderNews);
</script>
</body>
</html>
