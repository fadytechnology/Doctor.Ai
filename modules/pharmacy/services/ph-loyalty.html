<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>نظام الولاء - الصيدلي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../../CSS/style.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Cairo',sans-serif; background:#f2f4f8; direction:rtl; padding:16px; padding-bottom:80px; min-height:100vh; }
        .app-container { max-width:480px; margin:0 auto; background:#fff; border-radius:28px; padding:20px; box-shadow:0 8px 40px rgba(0,0,0,0.06); }
        .header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
        .header .back { background:none; border:none; font-size:20px; color:#0d9488; cursor:pointer; }
        .header .title { font-size:20px; font-weight:700; color:#1e293b; flex:1; }
        .rule-box { background:#ecfdf5; padding:16px; border-radius:16px; border-right:4px solid #0d9488; margin-bottom:16px; }
        .rule-box .label { font-weight:700; color:#0d9488; }
        .customer-item { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #f1f5f9; }
        .customer-item .points { font-weight:700; color:#0d9488; }
        .form-group { margin-bottom:12px; }
        .form-group label { display:block; font-weight:600; font-size:13px; color:#1e293b; margin-bottom:4px; }
        .form-group input { width:100%; padding:10px; border:2px solid #e5e7eb; border-radius:12px; }
        .btn-save { padding:10px 20px; background:#0d9488; color:#fff; border:none; border-radius:12px; cursor:pointer; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <button class="back" onclick="window.history.back()"><i class="fas fa-arrow-right"></i></button>
        <div class="title">💎 نظام الولاء</div>
    </div>
    <div class="rule-box">
        <div class="label"><i class="fas fa-cog"></i> إعدادات النقاط</div>
        <div style="display:flex;gap:10px;margin-top:8px;">
            <div style="flex:1;"><label style="font-size:12px;">نقاط لكل 10 ج.م</label><input type="number" id="pointsPer10" value="1" style="width:100%;padding:8px;border:1px solid #e5e7eb;border-radius:8px;" /></div>
            <div style="flex:1;"><label style="font-size:12px;">خصم لكل 100 نقطة (ج.م)</label><input type="number" id="discountPer100" value="10" style="width:100%;padding:8px;border:1px solid #e5e7eb;border-radius:8px;" /></div>
        </div>
        <button class="btn-save" style="margin-top:8px;" onclick="saveRules()"><i class="fas fa-save"></i> حفظ الإعدادات</button>
    </div>
    <h4 style="font-size:14px;color:#1e293b;margin-bottom:8px;">👥 نقاط العملاء</h4>
    <div id="customerPointsList"></div>
</div>
<script>
let rules = JSON.parse(localStorage.getItem('pharmacyLoyaltyRules') || '{"pointsPer10":1,"discountPer100":10}');
let customers = JSON.parse(localStorage.getItem('pharmacyCustomers') || '[{"name":"محمد علي","points":120},{"name":"سارة حسن","points":45},{"name":"خالد محمود","points":80}]');
function renderCustomers() {
    const container = document.getElementById('customerPointsList');
    container.innerHTML = '';
    customers.forEach(c => {
        const div = document.createElement('div');
        div.className = 'customer-item';
        div.innerHTML = `<span>${c.name}</span><span class="points">${c.points} نقطة</span>`;
        container.appendChild(div);
    });
}
function saveRules() {
    rules.pointsPer10 = parseInt(document.getElementById('pointsPer10').value) || 1;
    rules.discountPer100 = parseInt(document.getElementById('discountPer100').value) || 10;
    localStorage.setItem('pharmacyLoyaltyRules', JSON.stringify(rules));
    alert('✅ تم حفظ إعدادات النقاط');
}
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('pointsPer10').value = rules.pointsPer10 || 1;
    document.getElementById('discountPer100').value = rules.discountPer100 || 10;
    renderCustomers();
});
</script>
</body>
</html>
