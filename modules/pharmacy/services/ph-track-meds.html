<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>تتبع الأدوية - الصيدلي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../../CSS/style.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Cairo',sans-serif; background:#f2f4f8; direction:rtl; padding:16px; padding-bottom:80px; min-height:100vh; }
        .app-container { max-width:480px; margin:0 auto; background:#fff; border-radius:28px; padding:20px; box-shadow:0 8px 40px rgba(0,0,0,0.06); }
        .header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
        .header .back { background:none; border:none; font-size:20px; color:#0d9488; cursor:pointer; }
        .header .title { font-size:20px; font-weight:700; color:#1e293b; flex:1; }
        .form-group { margin-bottom:12px; }
        .form-group input { width:100%; padding:10px; border:2px solid #e5e7eb; border-radius:12px; }
        .btn-check { width:100%; padding:12px; background:#0d9488; color:#fff; border:none; border-radius:14px; cursor:pointer; margin-bottom:16px; }
        .result-box { background:#f8fafc; padding:16px; border-radius:12px; }
        .result-box .ok { color:#065f46; }
        .result-box .suspect { color:#dc2626; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <button class="back" onclick="window.history.back()"><i class="fas fa-arrow-right"></i></button>
        <div class="title">🔍 تتبع الأدوية</div>
    </div>
    <div class="form-group"><input type="text" id="batchCode" placeholder="أدخل كود الدفعة أو الباركود" /></div>
    <button class="btn-check" onclick="trackMed()"><i class="fas fa-search"></i> فحص الدواء</button>
    <div id="trackResult" class="result-box">
        <p style="color:#94a3b8;">قم بإدخال كود الدفعة للفحص</p>
    </div>
</div>
<script>
function trackMed() {
    const code = document.getElementById('batchCode').value.trim();
    if (!code) { alert('❌ أدخل كود الدفعة'); return; }
    const result = document.getElementById('trackResult');
    if (code.includes('123') || code.includes('valid')) {
        result.innerHTML = '<p class="ok">✅ الدواء أصلي (مطابق للقاعدة البيانات)</p>';
    } else if (code.includes('456') || code.includes('suspect')) {
        result.innerHTML = '<p class="suspect">⚠️ تحذير: هذا الدواء مٌشتبه فيه! يرجى التواصل مع الإدارة.</p>';
    } else {
        result.innerHTML = '<p style="color:#d97706;">⚠️ الكود غير معروف، يرجى التحقق من المصدر.</p>';
    }
}
</script>
</body>
</html>
