<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>مركز خدمات الصيدلي - Doctor.ai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../CSS/style.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: #f2f4f8;
            direction: rtl;
            padding: 16px;
            min-height: 100vh;
        }
        .app-container {
            max-width: 480px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .header .back {
            background: none;
            border: none;
            font-size: 20px;
            color: #0d9488;
            cursor: pointer;
            padding: 4px;
        }
        .header .back:active {
            transform: scale(0.9);
        }
        .header .title {
            font-size: 20px;
            font-weight: 700;
            color: #1e293b;
            flex: 1;
        }
        .header .badge-count {
            background: #0d9488;
            color: #fff;
            font-size: 12px;
            padding: 2px 10px;
            border-radius: 20px;
        }
        .search-box {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 15px;
            background: #fff;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-box:focus {
            border-color: #0d9488;
        }
        .category-title {
            font-size: 16px;
            font-weight: 700;
            color: #0d9488;
            margin: 16px 0 10px;
            border-right: 4px solid #0d9488;
            padding-right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .category-title span {
            font-size: 12px;
            color: #94a3b8;
            font-weight: 400;
        }
        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .service-card {
            background: #fff;
            padding: 14px 6px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }
        .service-card:active {
            transform: scale(0.94);
            background: #f8fafc;
        }
        .service-card i {
            font-size: 28px;
            color: #0d9488;
            display: block;
            margin-bottom: 4px;
            transition: transform 0.2s;
        }
        .service-card:hover i {
            transform: scale(1.1);
        }
        .service-card h4 {
            font-size: 11px;
            color: #1e293b;
            font-weight: 600;
            line-height: 1.3;
        }
        .service-card.link-card {
            border-left: 3px solid #f59e0b;
        }
        .service-card.link-card i {
            color: #f59e0b;
        }
        .service-card.link-card h4 {
            color: #b45309;
        }
        .empty-state {
            text-align: center;
            padding: 40px 0;
            color: #94a3b8;
        }
        .empty-state i {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
            color: #cbd5e1;
        }

        @media (max-width: 480px) {
            .services-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (max-width: 380px) {
            .services-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .service-card i {
                font-size: 22px;
            }
            .service-card h4 {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- ===== الهيدر ===== -->
        <div class="header">
            <button class="back" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-right"></i>
            </button>
            <div class="title">💊 مركز خدمات الصيدلي</div>
            <span class="badge-count" id="totalServices">0</span>
        </div>

        <!-- ===== شريط البحث ===== -->
        <input class="search-box" type="text" id="searchInput" placeholder="🔍 ابحث في الخدمات..." oninput="filterServices(this.value)" />

        <!-- ===== حاوية الخدمات ===== -->
        <div id="servicesContainer">
            <div class="empty-state">
                <i class="fas fa-spinner fa-pulse"></i>
                جاري تحميل الخدمات...
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // ===== مركز خدمات الصيدلي - جافا سكريبت =====
        // ============================================================

        // ----- 1. تحميل سجل الخدمات من localStorage -----
        let registry = [];
        try {
            const stored = localStorage.getItem('pharmacyServices');
            if (stored) {
                registry = JSON.parse(stored);
            }
        } catch (e) {
            console.warn('خطأ في قراءة pharmacyServices', e);
        }

        // ----- 2. بيانات افتراضية في حالة عدم وجود سجل -----
        if (!registry || registry.length === 0) {
            registry = [{
                id: 'ph-dashboard',
                name: 'لوحة التحكم',
                icon: 'fa-chart-pie',
                category: 'تطبيقية',
                description: 'عرض إحصائيات الطلبات والعملاء والمخزون',
                url: 'services/ph-dashboard.html'
            }, {
                id: 'ph-inventory',
                name: 'إدارة المخزون',
                icon: 'fa-boxes',
                category: 'تطبيقية',
                description: 'إضافة، تعديل، حذف المنتجات',
                url: 'services/ph-inventory.html'
            }, {
                id: 'ph-orders',
                name: 'إدارة الطلبات',
                icon: 'fa-shopping-cart',
                category: 'تطبيقية',
                description: 'عرض الطلبات وتحديث حالتها',
                url: 'services/ph-orders.html'
            }, {
                id: 'ph-store',
                name: 'المتجر الإلكتروني',
                icon: 'fa-store',
                category: 'تطبيقية',
                description: 'عرض المنتجات للمرضى',
                url: 'services/ph-store.html'
            }, {
                id: 'ph-loyalty',
                name: 'نظام الولاء',
                icon: 'fa-gem',
                category: 'تطبيقية',
                description: 'إدارة نقاط العملاء',
                url: 'services/ph-loyalty.html'
            }, {
                id: 'ph-analytics',
                name: 'تحليلات المبيعات',
                icon: 'fa-chart-bar',
                category: 'تطبيقية',
                description: 'رسوم بيانية للمبيعات',
                url: 'services/ph-analytics.html'
            }, {
                id: 'ph-alerts',
                name: 'تنبيهات المخزون',
                icon: 'fa-bell',
                category: 'تطبيقية',
                description: 'إشعارات النفاد والصلاحية',
                url: 'services/ph-alerts.html'
            }, {
                id: 'ph-settings',
                name: 'إعدادات الصيدلية',
                icon: 'fa-cog',
                category: 'تطبيقية',
                description: 'بيانات الصيدلية والإعدادات',
                url: 'services/ph-settings.html'
            }, {
                id: 'ph-customers',
                name: 'إدارة العملاء',
                icon: 'fa-users',
                category: 'تطبيقية',
                description: 'قائمة العملاء ونقاطهم',
                url: 'services/ph-customers.html'
            }, {
                id: 'ph-receive-orders',
                name: 'استقبال الطلبات',
                icon: 'fa-clipboard-list',
                category: 'ربط',
                description: 'استقبال طلبات المرضى',
                url: 'services/ph-receive-orders.html'
            }, {
                id: 'ph-collab-code',
                name: 'كود التعاون',
                icon: 'fa-qrcode',
                category: 'ربط',
                description: 'كود لربط المرضى',
                url: 'services/ph-collab-code.html'
            }, {
                id: 'ph-b2b',
                name: 'سوق B2B',
                icon: 'fa-handshake',
                category: 'ربط',
                description: 'تبادل الأدوية مع صيدليات أخرى',
                url: 'services/ph-b2b.html'
            }, {
                id: 'ph-shortage-alerts',
                name: 'تنبيه النواقص',
                icon: 'fa-exclamation-triangle',
                category: 'ربط',
                description: 'تنبيهات نقص الأدوية',
                url: 'services/ph-shortage-alerts.html'
            }, {
                id: 'ph-news',
                name: 'نشر أخبار وعروض',
                icon: 'fa-bullhorn',
                category: 'ربط',
                description: 'عروض للعملاء المربوطين',
                url: 'services/ph-news.html'
            }, {
                id: 'ph-prescriptions',
                name: 'الروشتات الرقمية',
                icon: 'fa-prescription',
                category: 'ربط',
                description: 'استقبال الروشتات من العيادات',
                url: 'services/ph-prescriptions.html'
            }, {
                id: 'ph-cashback',
                name: 'كاش باك الولاء',
                icon: 'fa-wallet',
                category: 'ربط',
                description: 'تحويل النقاط إلى خصومات',
                url: 'services/ph-cashback.html'
            }, {
                id: 'ph-track-meds',
                name: 'تتبع الأدوية المغشوشة',
                icon: 'fa-search',
                category: 'ربط',
                description: 'التحقق من مصدر الدواء',
                url: 'services/ph-track-meds.html'
            }];
            localStorage.setItem('pharmacyServices', JSON.stringify(registry));
        }

        // ----- 3. عرض الخدمات -----
        function renderServices(filter = '') {
            const container = document.getElementById('servicesContainer');
            container.innerHTML = '';
            const q = filter.trim().toLowerCase();

            // تجميع حسب الفئة
            const categories = {};
            registry.forEach(s => {
                const cat = s.category || 'أخرى';
                if (!categories[cat]) categories[cat] = [];
                categories[cat].push(s);
            });

            let hasResults = false;
            let totalCount = 0;

            // عرض كل فئة
            Object.keys(categories).forEach(cat => {
                const services = categories[cat].filter(s =>
                    s.name.includes(q) ||
                    (s.description && s.description.includes(q))
                );
                if (services.length === 0) return;

                hasResults = true;
                totalCount += services.length;

                // عنوان الفئة
                const catDiv = document.createElement('div');
                catDiv.className = 'category-title';
                catDiv.innerHTML = `${cat} <span>${services.length} خدمة</span>`;
                container.appendChild(catDiv);

                // شبكة الخدمات
                const grid = document.createElement('div');
                grid.className = 'services-grid';

                services.forEach(s => {
                    const card = document.createElement('div');
                    card.className = 'service-card';
                    if (cat === 'ربط' || cat.includes('ربط')) {
                        card.classList.add('link-card');
                    }
                    card.innerHTML = `
                        <i class="fas ${s.icon}"></i>
                        <h4>${s.name}</h4>
                    `;
                    card.onclick = () => {
                        if (s.url) {
                            window.location.href = s.url;
                        } else {
                            alert('🔜 هذه الخدمة قيد التطوير');
                        }
                    };
                    grid.appendChild(card);
                });

                container.appendChild(grid);
            });

            // تحديث العدد الكلي
            document.getElementById('totalServices').textContent = totalCount;

            // حالة عدم وجود نتائج
            if (!hasResults) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        لا توجد خدمات مطابقة للبحث
                    </div>
                `;
            }
        }

        // ----- 4. فلترة الخدمات (البحث) -----
        function filterServices(value) {
            renderServices(value);
        }

        // ----- 5. تحميل الصفحة -----
        document.addEventListener('DOMContentLoaded', function() {
            // تأكد من تحميل السجل من localStorage (قد يكون تحدث)
            try {
                const stored = localStorage.getItem('pharmacyServices');
                if (stored) {
                    const parsed = JSON.parse(stored);
                    if (parsed.length > 0) registry = parsed;
                }
            } catch (e) {}

            renderServices();
            console.log('✅ مركز خدمات الصيدلي جاهز (' + registry.length + ' خدمة)');
        });
    </script>
</body>
</html>
