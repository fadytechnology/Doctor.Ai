<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>استعادة كلمة المرور - Doctor.ai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { max-width: 420px; width: 100%; background: #fff; padding: 35px 28px; border-radius: 28px; box-shadow: 0 12px 48px rgba(0,0,0,0.08); }
        .logo { text-align: center; font-size: 28px; font-weight: 900; color: #0d9488; margin-bottom: 20px; }
        .logo i { color: #fbbf24; margin-left: 8px; }
        .title { text-align: center; margin-bottom: 25px; }
        .title h2 { font-size: 24px; color: #1e293b; font-weight: 700; }
        .title p { color: #64748b; font-size: 14px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 600; color: #1e293b; font-size: 13px; margin-bottom: 4px; }
        .form-group input { width: 100%; padding: 12px 14px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 15px; background: #f9fafb; }
        .form-group input:focus { outline: none; border-color: #0d9488; background: #fff; }
        .btn-primary { width: 100%; padding: 14px; background: #0d9488; color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-primary:hover { background: #0f766e; }
        .footer-link { text-align: center; margin-top: 18px; font-size: 14px; color: #64748b; }
        .footer-link a { color: #0d9488; text-decoration: none; font-weight: 600; }
        .msg { padding: 12px 16px; border-radius: 12px; font-size: 14px; margin-bottom: 16px; display: none; text-align: center; }
        .msg.error { background: #fef2f2; color: #dc2626; display: block; border-right: 4px solid #dc2626; }
        .msg.success { background: #d1fae5; color: #065f46; display: block; border-right: 4px solid #065f46; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><i class="fas fa-heartbeat"></i> Doctor.<span style="color:#fbbf24;">ai</span></div>
        <div class="title">
            <h2>نسيت كلمة المرور؟</h2>
            <p>سنرسل لك رابط إعادة التعيين على بريدك</p>
        </div>
        <div id="msg" class="msg"></div>
        <form id="forgotForm">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="example@mail.com" required />
            </div>
            <button type="submit" class="btn-primary"><i class="fas fa-paper-plane"></i> إرسال رابط إعادة التعيين</button>
        </form>
        <p class="footer-link"><a href="login.html">تذكرت كلمة المرور؟ تسجيل الدخول</a></p>
    </div>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('msg');
            msg.style.display = 'none';
            const email = document.getElementById('email').value.trim();
            if (!email) {
                msg.textContent = '❌ الرجاء إدخال البريد الإلكتروني';
                msg.className = 'msg error';
                msg.style.display = 'block';
                return;
            }
            try {
                const res = await fetch('http://localhost:5000/api/password/forgot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (data.success) {
                    msg.textContent = '✅ ' + data.message;
                    msg.className = 'msg success';
                    msg.style.display = 'block';
                } else {
                    msg.textContent = '❌ ' + data.message;
                    msg.className = 'msg error';
                    msg.style.display = 'block';
                }
            } catch (error) {
                msg.textContent = '⚠️ تعذر الاتصال بالسيرفر';
                msg.className = 'msg error';
                msg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
