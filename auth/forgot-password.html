<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور - Doctor.ai</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box" style="position: relative;">
            <div class="language-switcher" style="position: absolute; top: 15px; left: 15px;">
                <button class="lang-btn" data-lang="ar" id="lang-ar-forgot">عربي</button>
                <button class="lang-btn" data-lang="en" id="lang-en-forgot">English</button>
            </div>

            <a href="login.html" class="back-home" style="margin-top: 40px;">
                <i class="fas fa-arrow-right"></i> <span data-key="forgot_back">العودة لتسجيل الدخول</span>
            </a>

            <div class="auth-logo">
                <i class="fas fa-heartbeat" style="color: #0d9488; font-size: 30px;"></i>
                <h3>Doctor.<span style="color: #0d9488;">ai</span></h3>
            </div>

            <h2 id="stepTitle" data-key="forgot_title">استعادة كلمة المرور</h2>
            <p class="auth-subtitle" id="stepSubtitle" data-key="forgot_subtitle">سنرسل لك رمز تحقق لتأكيد هويتك</p>

            <div class="step-indicators">
                <div class="step-dot active" data-step="1">1</div>
                <div class="step-line"></div>
                <div class="step-dot" data-step="2">2</div>
                <div class="step-line"></div>
                <div class="step-dot" data-step="3">3</div>
            </div>

            <div id="step-1" class="step-content">
                <form id="requestOtpForm">
                    <div class="input-group">
                        <label for="resetEmailPhone"><i class="fas fa-user"></i> <span data-key="forgot_email_phone">البريد الإلكتروني أو رقم الهاتف</span></label>
                        <input type="text" id="resetEmailPhone" placeholder="أدخل بريدك أو تليفونك" required>
                    </div>
                    <button type="submit" class="btn-primary btn-full"><i class="fas fa-paper-plane"></i> <span data-key="forgot_send_btn">إرسال رمز التحقق</span></button>
                </form>
            </div>

            <div id="step-2" class="step-content" style="display: none;">
                <p style="text-align: center; color: #64748b; font-size: 14px; margin-bottom: 20px;" data-key="forgot_otp_subtitle">أدخل الـ 6 أرقام المرسلة إلى بريدك أو هاتفك</p>
                <form id="verifyOtpForm">
                    <div class="otp-inputs">
                        <input type="text" maxlength="1" class="otp-field" required>
                        <input type="text" maxlength="1" class="otp-field" required>
                        <input type="text" maxlength="1" class="otp-field" required>
                        <input type="text" maxlength="1" class="otp-field" required>
                        <input type="text" maxlength="1" class="otp-field" required>
                        <input type="text" maxlength="1" class="otp-field" required>
                    </div>
                    <button type="submit" class="btn-primary btn-full" style="margin-top: 25px;"><i class="fas fa-check-circle"></i> <span data-key="forgot_otp_verify_btn">تحقق من الرمز</span></button>
                </form>
                <p style="text-align: center; margin-top: 15px; font-size: 14px;">
                    <a href="#" id="resendOtpLink" style="color: #0d9488; text-decoration: none;" data-key="forgot_otp_resend">إعادة إرسال الرمز</a>
                </p>
            </div>

            <div id="step-3" class="step-content" style="display: none;">
                <form id="resetPasswordForm">
                    <div class="input-group">
                        <label for="newPassword"><i class="fas fa-lock"></i> <span data-key="forgot_new_password">كلمة السر الجديدة</span></label>
                        <input type="password" id="newPassword" placeholder="أدخل كلمة السر (8 أحرف على الأقل)" required>
                    </div>
                    <div class="input-group">
                        <label for="confirmNewPassword"><i class="fas fa-check-circle"></i> <span data-key="forgot_confirm_password">تأكيد كلمة السر</span></label>
                        <input type="password" id="confirmNewPassword" placeholder="أعد إدخال كلمة السر" required>
                    </div>
                    <button type="submit" class="btn-primary btn-full"><i class="fas fa-save"></i> <span data-key="forgot_reset_btn">إعادة تعيين كلمة السر</span></button>
                </form>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
