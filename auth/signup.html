<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إنشاء حساب - Doctor.ai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../CSS/style.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f2f4f8; direction: rtl; padding: 16px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-container { max-width: 480px; width: 100%; background: #fff; border-radius: 28px; padding: 32px 24px; box-shadow: 0 8px 40px rgba(0,0,0,0.06); }
        .auth-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .auth-header .logo { font-size: 24px; font-weight: 800; color: #0d9488; }
        .auth-header .logo i { color: #fbbf24; }
        .auth-header .back { color: #94a3b8; text-decoration: none; font-size: 14px; }
        .auth-title { text-align: center; margin-bottom: 24px; }
        .auth-title h2 { font-size: 24px; color: #1e293b; font-weight: 700; }
        .auth-title p { color: #64748b; font-size: 14px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 600; color: #1e293b; font-size: 13px; margin-bottom: 4px; }
        .form-group label i { color: #0d9488; margin-left: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 12px 14px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 15px; background: #f9fafb; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #0d9488; background: #fff; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-group .hint { font-size: 11px; color: #94a3b8; margin-top: 4px; }
        .form-group .password-wrapper { position: relative; }
        .form-group .password-wrapper input { padding-left: 48px; }
        .form-group .toggle-password { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 16px; padding: 4px; }
        .terms-group { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #475569; cursor: pointer; }
        .terms-group input { accent-color: #0d9488; width: 18px; height: 18px; }
        .terms-group a { color: #0d9488; text-decoration: none; }
        .btn-primary-full { width: 100%; padding: 14px; background: #0d9488; color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-primary-full:hover { background: #0f766e; }
        .auth-footer { text-align: center; margin-top: 20px; font-size: 14px; color: #64748b; }
        .auth-footer a { color: #0d9488; text-decoration: none; font-weight: 600; }
        .auth-msg { padding: 12px 16px; border-radius: 12px; font-size: 14px; margin-bottom: 16px; text-align: center; display: none; }
        .auth-msg.error { background: #fef2f2; color: #dc2626; display: block; }
        .auth-msg.success { background: #d1fae5; color: #065f46; display: block; }
        .divider { display: flex; align-items: center; margin: 20px 0; color: #94a3b8; font-size: 14px; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }
        .divider span { padding: 0 15px; }
        .btn-google { width: 100%; padding: 14px; background: #fff; color: #1e293b; border: 2px solid #e5e7eb; border-radius: 14px; font-size: 16px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-google:hover { background: #f8fafc; border-color: #0d9488; }
        @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } .auth-container { padding: 24px 16px; } }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="auth-header">
        <div class="logo"><i class="fas fa-heartbeat"></i> Doctor.<span style="color:#fbbf24;">ai</span></div>
        <a href="../index.html" class="back"><i class="fas fa-arrow-right"></i> الرئيسية</a>
    </div>
    <div class="auth-title">
        <h2>إنشاء حساب جديد</h2>
        <p>انضم إلى منصتنا الصحية المتكاملة</p>
    </div>
    <div id="errorMsg" class="auth-msg error"></div>
    <div id="successMsg" class="auth-msg success"></div>
    <form id="signupForm">
        <div class="form-group">
            <label><i class="fas fa-user"></i> الاسم الكامل</label>
            <input type="text" id="fullName" placeholder="مثال: أحمد محمد علي" required />
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="ahmed@example.com" required />
            </div>
            <div class="form-group">
                <label><i class="fas fa-phone"></i> رقم الهاتف</label>
                <input type="tel" id="phone" placeholder="01001234567" required />
                <div class="hint">يجب أن يكون 11 رقم ويبدأ بـ 01</div>
            </div>
        </div>
        <div class="form-group">
            <label><i class="fas fa-users"></i> الفئة</label>
            <select id="role" required>
                <option value="patient">مريض</option>
                <option value="pharmacy">صيدلي</option>
                <option value="clinic">عيادة / طبيب</option>
                <option value="lab">معمل</option>
                <option value="radiology">مركز أشعة</option>
                <option value="supplier">مورد</option>
                <option value="admin">إدارة مركزية</option>
            </select>
            <div class="hint">اختر الفئة التي تناسبك</div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label><i class="fas fa-lock"></i> كلمة السر</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="8 أحرف على الأقل" required />
                    <button type="button" class="toggle-password" onclick="togglePassword('password', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-check-circle"></i> تأكيد كلمة السر</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" placeholder="أعد كتابة كلمة السر" required />
                    <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
        </div>
        <div class="form-group" style="margin-top: 16px;">
            <label class="terms-group">
                <input type="checkbox" id="termsCheck" required />
                أوافق على <a href="terms.html" target="_blank">الشروط والأحكام</a>
            </label>
        </div>
        <button type="submit" class="btn-primary-full"><i class="fas fa-user-plus"></i> إنشاء الحساب</button>
    </form>
    <div class="divider"><span>أو</span></div>
    <button class="btn-google" onclick="alert('🔐 سيتم تفعيل الدخول بجوجل قريباً')">
        <i class="fab fa-google"></i> التسجيل بحساب Google
    </button>
    <p class="auth-footer">لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
</div>

<script>
    // ============================================================
    // ===== تسجيل حساب جديد (مربوط بالسيرفر الحقيقي) =====
    // ============================================================

    const API_BASE = 'http://localhost:5000'; // تأكد أن السيرفر شغال على هذا المنفذ

    // دالة إظهار/إخفاء كلمة السر
    function togglePassword(inputId, button) {
        const input = document.getElementById(inputId);
        if (!input) return;
        const icon = button.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'fas fa-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'fas fa-eye';
        }
    }

    // توجيه المستخدم بعد التسجيل حسب الدور
    function goToDashboard(user) {
        if (!user || !user.role) {
            window.location.href = '../index.html';
            return;
        }
        const map = {
            'patient': '../modules/patient/index.html',
            'pharmacy': '../modules/pharmacy/index.html',
            'clinic': '../modules/clinic/index.html',
            'doctor': '../modules/clinic/index.html', // مراعاة دور الطبيب
            'lab': '../modules/lab/index.html',
            'radiology': '../modules/radiology/index.html',
            'supplier': '../modules/supplier/index.html',
            'admin': '../modules/admin/index.html'
        };
        window.location.href = map[user.role] || '../index.html';
    }

    // معالج التسجيل
    async function handleSignup(e) {
        e.preventDefault();

        // قراءة المدخلات
        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const role = document.getElementById('role').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const termsCheck = document.getElementById('termsCheck').checked;

        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const btn = document.querySelector('button[type="submit"]');

        // إخفاء الرسائل السابقة
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';

        // التحقق من الحقول
        if (!fullName || !email || !phone || !password || !confirmPassword) {
            errorMsg.textContent = '❌ يرجى ملء جميع الحقول';
            errorMsg.style.display = 'block';
            return;
        }
        if (!termsCheck) {
            errorMsg.textContent = '❌ يرجى الموافقة على الشروط والأحكام';
            errorMsg.style.display = 'block';
            return;
        }
        if (password !== confirmPassword) {
            errorMsg.textContent = '❌ كلمة السر وتأكيدها غير متطابقين';
            errorMsg.style.display = 'block';
            return;
        }
        if (password.length < 8) {
            errorMsg.textContent = '❌ كلمة السر يجب أن تكون 8 أحرف على الأقل';
            errorMsg.style.display = 'block';
            return;
        }
        if (!/^01[0-9]{9}$/.test(phone)) {
            errorMsg.textContent = '❌ رقم الهاتف يجب أن يكون 11 رقم ويبدأ بـ 01';
            errorMsg.style.display = 'block';
            return;
        }

        // تعطيل الزر أثناء الإرسال
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> جاري التسجيل...';

        try {
            const response = await fetch(`${API_BASE}/api/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    full_name: fullName,
                    email: email,
                    phone: phone,
                    password: password,
                    role: role
                })
            });

            const data = await response.json();

            if (response.ok) {
                // تخزين التوكن وبيانات المستخدم
                const storage = localStorage; // نستخدم localStorage دائماً للتسجيل
                if (data.token) {
                    storage.setItem('token', data.token);
                }
                if (data.user) {
                    storage.setItem('currentUser', JSON.stringify(data.user));
                }

                successMsg.textContent = '✅ ' + (data.message || 'تم إنشاء الحساب بنجاح!');
                successMsg.style.display = 'block';

                // توجيه المستخدم بعد 1.5 ثانية
                setTimeout(() => {
                    if (data.user) {
                        goToDashboard(data.user);
                    } else {
                        window.location.href = 'login.html';
                    }
                }, 1500);
            } else {
                errorMsg.textContent = '❌ ' + (data.message || 'حدث خطأ أثناء التسجيل');
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> إنشاء الحساب';
            }
        } catch (error) {
            errorMsg.textContent = `⚠️ تعذر الاتصال بالسيرفر (${API_BASE}) - تأكد من تشغيله`;
            errorMsg.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-user-plus"></i> إنشاء الحساب';
            console.error('Fetch error:', error);
        }
    }

    // ربط النموذج بالمعالج
    document.getElementById('signupForm').addEventListener('submit', handleSignup);

    // إضافة Spinner مؤقت
    const style = document.createElement('style');
    style.textContent = `
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-left: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    `;
    document.head.appendChild(style);

    console.log('✅ صفحة التسجيل (مربوطة بالسيرفر) جاهزة!');
</script>
</body>
</html>
